# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

providers:
  - id: togetherai:chat:Qwen/Qwen2.5-Coder-32B-Instruct
    config:
      temperature: 0.0
      apiKeyEnvar: TOGETHER_API_KEY
      cache: false
      # Note: We're not setting max_tokens here as it doesn't work
      env:
        OPENAI_MAX_TOKENS: 4096  # This is the workaround mentioned in the issue

prompts:
  - label: test-prompt
    raw: "Write a very long response that would require more than 1024 tokens. Detail the history of artificial intelligence from its inception to the present day, including key milestones, important researchers, breakthrough algorithms, and how each advancement has contributed to the field. Please be comprehensive and include many specific details."

tests:
  - description: "Response should be longer than what would be possible with a 1024 token limit"
    vars:
      prompt: "{{prompts.test-prompt.raw}}"
    assert:
      - type: javascript
        value: "response.output.length > 1024 * 3"  # A response > 1024 tokens would typically have more than ~3000 characters 