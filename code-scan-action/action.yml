name: 'Promptfoo Code Scan'
description: 'Scan pull requests for LLM security vulnerabilities'
author: 'Promptfoo, Inc.'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  api-host:
    description: 'Promptfoo API host URL; when set, overrides apiHost from config-path.'
    required: false
  min-severity:
    description: 'Minimum severity level to report (low|medium|high|critical). Applied to the generated action-input config; ignored when config-path is set. Defaults to medium when neither min-severity nor minimum-severity is set.'
    required: false
  minimum-severity:
    description: 'Alias for min-severity (low|medium|high|critical). Applied to the generated action-input config; ignored when config-path is set. Has no default; takes effect only when min-severity is not set.'
    required: false
  config-path:
    description: 'Path to YAML configuration file. When set, the file supplies scan settings instead of action inputs (diffs-only, min-severity, guidance, guidance-file); api-host still overrides when explicitly provided.'
    required: false
  diffs-only:
    description: 'Scan only PR diffs instead of tracing into surrounding repository context. Applied to the generated action-input config; ignored when config-path is set.'
    required: false
    default: 'false'
  guidance:
    description: 'Custom guidance for the security scan. Applied to the generated action-input config; ignored when config-path is set.'
    required: false
  guidance-file:
    description: 'Path to file containing custom guidance. Applied to the generated action-input config; ignored when config-path is set.'
    required: false
  github-token:
    description: 'GitHub token for authentication (default: github.token)'
    required: false
    default: ${{ github.token }}
  enable-fork-prs:
    description: 'Enable scanning PRs from forked repositories'
    required: false
    default: 'false'
  sarif-output-path:
    description: 'Optional path to write SARIF output for upload to GitHub Code Scanning'
    required: false

outputs:
  sarif-path:
    description: 'Path to the SARIF file when a scan completes and sarif-output-path is configured'

runs:
  using: 'node20'
  main: 'dist/index.js'
