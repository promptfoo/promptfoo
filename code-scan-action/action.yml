name: 'Promptfoo Code Scan'
description: 'Scan pull requests for LLM security vulnerabilities'
author: 'Promptfoo, Inc.'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  api-host:
    description: 'Promptfoo API host URL; when set, overrides apiHost from config-path'
    required: false
  min-severity:
    description: 'Minimum severity level to report (low|medium|high|critical); defaults to medium when neither severity alias is set'
    required: false
  minimum-severity:
    description: 'Alias for min-severity (low|medium|high|critical); defaults to medium when neither severity alias is set'
    required: false
  config-path:
    description: 'Path to YAML configuration file; when set, the file supplies scan settings unless api-host is explicitly provided'
    required: false
  diffs-only:
    description: 'Scan only PR diffs instead of tracing into surrounding repository context'
    required: false
    default: 'false'
  guidance:
    description: 'Custom guidance for the security scan'
    required: false
  guidance-file:
    description: 'Path to file containing custom guidance'
    required: false
  github-token:
    description: 'GitHub token for authentication (default: github.token)'
    required: false
    default: ${{ github.token }}
  enable-fork-prs:
    description: 'Enable scanning PRs from forked repositories'
    required: false
    default: 'false'
  sarif-output-path:
    description: 'Optional path to write SARIF output for upload to GitHub Code Scanning'
    required: false

outputs:
  sarif-path:
    description: 'Path to the SARIF file when a scan completes and sarif-output-path is configured'

runs:
  using: 'node20'
  main: 'dist/index.js'
