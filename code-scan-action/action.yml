name: 'Promptfoo Code Scan'
description: 'Scan pull requests for LLM security vulnerabilities'
author: 'Promptfoo, Inc.'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  api-host:
    description: 'Promptfoo API host URL. Keep this workflow-controlled; config-path cannot override it.'
    required: false
    default: https://api.promptfoo.app
  min-severity:
    description: 'Minimum severity level to report (low|medium|high|critical). Used for generated config and ignored when config-path is set. Defaults to medium when neither severity input is set.'
    required: false
  minimum-severity:
    description: 'Alias for min-severity (low|medium|high|critical). Used for generated config and ignored when config-path is set.'
    required: false
  config-path:
    description: 'Path to an explicit, trusted YAML configuration file. Supplies scan policy; api-host remains workflow-controlled.'
    required: false
  diffs-only:
    # Keep this default-free so the action can distinguish an omitted input from
    # an explicit false when reporting inputs ignored by config-path.
    description: 'Scan only PR diffs instead of tracing into the repository. Used for generated config and ignored when config-path is set. Defaults to false.'
    required: false
  guidance:
    description: 'Custom guidance for generated config. Ignored when config-path is set.'
    required: false
  guidance-file:
    description: 'Path to custom guidance for generated config. Ignored when config-path is set.'
    required: false
  github-token:
    description: 'GitHub token for authentication (default: github.token)'
    required: false
    default: ${{ github.token }}
  enable-fork-prs:
    description: 'Enable scanning PRs from forked repositories'
    required: false
    default: 'false'
  sarif-output-path:
    description: 'Optional path to write SARIF output for upload to GitHub Code Scanning'
    required: false

outputs:
  sarif-path:
    description: 'Path to the SARIF file when a scan completes and sarif-output-path is configured'

runs:
  using: 'node24'
  main: 'dist/index.js'
