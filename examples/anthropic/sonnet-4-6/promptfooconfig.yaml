# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Claude Sonnet 4.6 fast and accurate responses

prompts:
  - |
    {{task}}

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      temperature: 0
      max_tokens: 2048

tests:
  # Reasoning and knowledge
  - vars:
      task: >-
        I speak without a mouth and hear without ears. I have no body, but I
        come alive with wind. What am I?
    assert:
      - type: icontains
        value: echo
      - type: llm-rubric
        value: Gives a clear, concise explanation of why the answer is correct

  # Structured extraction
  - vars:
      task: |
        Extract the following from this text and return JSON:

        "On March 5, 2025, Acme Corp announced a $2.4 billion acquisition of
        Widget Inc. The deal is expected to close in Q3 2025, subject to
        regulatory approval. Acme's CEO Jane Park called it a 'transformative
        moment' for the company."

        Return: {"company", "target", "amount", "expected_close", "ceo"}
    assert:
      - type: contains
        value: Acme Corp
      - type: contains
        value: Widget Inc
      - type: contains
        value: Jane Park

  # Code generation
  - vars:
      task: |
        Write a TypeScript function called `debounce` that:
        1. Takes a function and a delay in milliseconds
        2. Returns a debounced version that delays invocation until after
           the delay has elapsed since the last call
        3. Includes proper TypeScript generics for type safety
    assert:
      - type: contains
        value: debounce
      - type: contains-any
        value: ['setTimeout', 'clearTimeout']
      - type: javascript
        value: output.includes('<') && output.includes('>')
        reason: Should use TypeScript generics

  # Summarization
  - vars:
      task: |
        Summarize the key differences between REST and GraphQL APIs in exactly
        3 bullet points. Each bullet should be one sentence.
    assert:
      - type: llm-rubric
        value: |
          The response should:
          1. Have exactly 3 bullet points
          2. Each bullet is a single sentence
          3. Accurately describe real differences between REST and GraphQL
      - type: contains-any
        value: ['query', 'endpoint', 'schema', 'fetch']
