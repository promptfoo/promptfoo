description: 'Example of using Google Vertex AI with custom credentials'

providers:
  # Example using file path - credentials will be loaded from the file
  - vertex:gemini-1.5-pro:
      credentials: 'file://service-account.json'

  # Example using direct JSON string (not recommended for production)
  - vertex:gemini-1.5-pro:
      id: vertex-with-inline-creds
      credentials: '{"type":"service_account","project_id":"your-project-id","private_key_id":"key-id","private_key":"-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n","client_email":"service-account@your-project.iam.gserviceaccount.com","client_id":"123456789","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token"}'

  # Example with image generation using credentials
  - google:image:imagen-3.0-generate-001:
      credentials: 'file://service-account.json'
      projectId: 'your-project-id'

prompts:
  - 'Explain quantum computing in simple terms'
  - 'What are the benefits of renewable energy?'
  - 'A serene mountain landscape at sunset'

tests:
  - vars:
      topic: 'artificial intelligence'
    assert:
      - type: contains
        value: 'AI'
  - vars:
      topic: 'climate change'
    assert:
      - type: contains
        value: 'climate'
  # Test for image generation
  - assert:
      - type: contains
        value: 'Generated Image'
