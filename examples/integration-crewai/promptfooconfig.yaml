# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: 'CrewAI Recruitment Agent Evaluation'

prompts:
  - 'Find top candidates for the following role: {{role}}'

providers:
  - id: 'file://./agent.py'
    label: 'CrewAI Recruitment Agent'
    config:
      model: 'openai/gpt-4.1'

# It's a good practice to have a defaultTest that applies to all test cases.
defaultTest:
  assert:
    # Validate the complete structured output contract.
    - type: is-json
      value:
        type: object
        properties:
          candidates:
            type: array
            minItems: 2
            uniqueItems: true
            items:
              type: object
              properties:
                name:
                  type: string
                  pattern: '\S'
                experience:
                  type: string
                  pattern: '\S'
                skills:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    pattern: '\S'
              required: ['name', 'experience', 'skills']
          summary:
            type: string
            pattern: '\S'
        required: ['candidates', 'summary']

tests:
  - description: 'Full-Stack Engineer skill match'
    vars:
      role: 'A Full-Stack Engineer with Python, Django, and React experience.'
    assert:
      - type: python
        value: |
          import re

          def has_skill(candidate, required_skill):
              return any(
                  re.search(rf'(?<![a-z0-9]){re.escape(required_skill)}(?![a-z0-9])', skill.lower())
                  for skill in candidate.get('skills', [])
              )

          required_skills = ['python', 'django', 'react']
          return all(
              all(has_skill(candidate, required_skill) for required_skill in required_skills)
              for candidate in output.get('candidates', [])
          )

  - description: 'Data Scientist with Machine Learning and Cloud'
    vars:
      role: 'A Data Scientist with machine learning, Python, and cloud (AWS or GCP) experience.'
    assert:
      - type: python
        value: |
          import re

          def has_skill(candidate, required_skill):
              return any(
                  re.search(rf'(?<![a-z0-9]){re.escape(required_skill)}(?![a-z0-9])', skill.lower())
                  for skill in candidate.get('skills', [])
              )

          machine_learning_skills = ['machine learning', 'tensorflow', 'pytorch']
          cloud_skills = ['aws', 'gcp']
          return all(
              has_skill(candidate, 'python')
              and any(has_skill(candidate, skill) for skill in machine_learning_skills)
              and any(has_skill(candidate, skill) for skill in cloud_skills)
              for candidate in output.get('candidates', [])
          )

  - description: 'UX/UI Designer skill match'
    vars:
      role: 'A UX/UI designer with Figma and Adobe tools experience.'
    assert:
      - type: python
        value: |
          import re

          def has_skill(candidate, required_skill):
              return any(
                  re.search(rf'(?<![a-z0-9]){re.escape(required_skill)}(?![a-z0-9])', skill.lower())
                  for skill in candidate.get('skills', [])
              )

          return all(
              has_skill(candidate, 'figma') and has_skill(candidate, 'adobe')
              for candidate in output.get('candidates', [])
          )
