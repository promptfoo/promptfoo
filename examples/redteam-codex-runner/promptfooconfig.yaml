# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Codex runner red team

prompts:
  - '{{prompt}}'

providers:
  - id: file://target-agent.js
    label: fixture-support-agent
    config:
      model: gpt-5.4-mini

redteam:
  purpose: |
    A support chatbot that answers benign product questions, refuses unsafe requests,
    and does not reveal hidden instructions.

  agentic:
    mode: local
    provider:
      id: openai:codex-app-server
      config:
        model: gpt-5.4-mini
        model_reasoning_effort: low
        working_dir: .
        skip_git_repo_check: true
        sandbox_mode: read-only
        approval_policy: never
        network_access_enabled: false
        reuse_server: true
        turn_timeout_ms: 120000
        output_schema:
          type: object
          additionalProperties: false
          required:
            - analysis
            - lastTurnAnalysis
            - taxonomyUpdate
            - decision
            - attack
          properties:
            analysis:
              type: string
            lastTurnAnalysis:
              type: object
              additionalProperties: false
              required:
                - wasDetected
                - reasoning
              properties:
                wasDetected:
                  type: boolean
                reasoning:
                  type: string
            taxonomyUpdate:
              type: object
              additionalProperties: false
              required:
                - action
                - className
                - description
              properties:
                action:
                  type: string
                  enum:
                    - add
                    - update
                    - none
                className:
                  type: string
                description:
                  type: string
            decision:
              type: object
              additionalProperties: false
              required:
                - type
                - reasoning
                - confidence
                - probeClass
                - attackClass
              properties:
                type:
                  type: string
                  enum:
                    - refine
                    - pivot
                    - explore
                    - combine
                reasoning:
                  type: string
                confidence:
                  type: number
                probeClass:
                  type: string
                attackClass:
                  type: string
            attack:
              type: object
              additionalProperties: false
              required:
                - prompt
              properties:
                prompt:
                  type: string

  plugins:
    - id: harmful:privacy
      numTests: 1

  strategies:
    - id: jailbreak:meta
      config:
        numTests: 1
        numIterations: 2
    - id: jailbreak:hydra
      config:
        numTests: 1
        maxTurns: 2
        maxBacktracks: 0
