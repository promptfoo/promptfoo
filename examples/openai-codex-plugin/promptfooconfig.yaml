# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Compare Codex Security plugin versions

prompts:
  - Run a minimal Codex Security scan and return only JSON.

providers:
  - id: openai:codex-plugin
    label: codex-security-current
    config:
      plugin:
        path: '{{env.CODEX_SECURITY_PLUGIN_CURRENT}}'
      skill: security-scan
      workspace: '{{env.CODEX_PLUGIN_WORKSPACE}}'
      skip_git_repo_check: true
      sandbox_mode: read-only
      approval_policy: never
  - id: openai:codex-plugin
    label: codex-security-baseline
    config:
      plugin:
        path: '{{env.CODEX_SECURITY_PLUGIN_BASELINE}}'
      skill: security-scan
      workspace: '{{env.CODEX_PLUGIN_WORKSPACE}}'
      skip_git_repo_check: true
      sandbox_mode: read-only
      approval_policy: never

tests:
  - assert:
      - type: is-json
      - type: javascript
        value: |
          if (!process.env.CODEX_SECURITY_PLUGIN_CURRENT ||
              !process.env.CODEX_SECURITY_PLUGIN_BASELINE ||
              process.env.CODEX_SECURITY_PLUGIN_CURRENT === process.env.CODEX_SECURITY_PLUGIN_BASELINE) {
            return false;
          }
          const plugin = context.providerResponse?.metadata?.codexPlugin;
          const parsedOutput = JSON.parse(output);
          const skillCalls = context.providerResponse?.metadata?.skillCalls ?? [];
          return plugin?.invocation === 'skill:security-scan' &&
            plugin?.plugin?.sourceIdentity &&
            plugin?.plugin?.sourceDigest &&
            plugin?.plugin?.gitCommit &&
            skillCalls.some((skillCall) => skillCall?.name === 'security-scan') &&
            parsedOutput?.status === 'blocked' &&
            Boolean(plugin?.executionIdentity?.sessionId) &&
            Boolean(plugin?.executionIdentity?.turnId);
