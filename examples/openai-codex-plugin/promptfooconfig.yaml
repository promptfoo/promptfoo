# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Compare Codex plugin versions

prompts:
  - Run a minimal Codex plugin task and return only JSON.

providers:
  - id: openai:codex-plugin
    label: codex-plugin-current
    config:
      plugin:
        path: '{{env.CODEX_PLUGIN_CURRENT}}'
      skill: demo-skill
      workspace: '{{env.CODEX_PLUGIN_WORKSPACE}}'
      skip_git_repo_check: true
      sandbox_mode: read-only
      approval_policy: never
  - id: openai:codex-plugin
    label: codex-plugin-baseline
    config:
      plugin:
        path: '{{env.CODEX_PLUGIN_BASELINE}}'
      skill: demo-skill
      workspace: '{{env.CODEX_PLUGIN_WORKSPACE}}'
      skip_git_repo_check: true
      sandbox_mode: read-only
      approval_policy: never

tests:
  - assert:
      - type: is-json
      - type: javascript
        value: |
          const plugin = context.providerResponse?.metadata?.codexPlugin;
          const skillCalls = context.providerResponse?.metadata?.skillCalls ?? [];
          return plugin?.invocation === 'skill:demo-skill' &&
            plugin?.plugin?.sourceIdentity &&
            plugin?.plugin?.sourceDigest &&
            skillCalls.some((skillCall) => skillCall?.name === 'demo-skill') &&
            Boolean(plugin?.executionIdentity?.sessionId || plugin?.executionIdentity?.turnId);
