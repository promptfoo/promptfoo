# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: HTTP provider streaming with TTFT measurement

# Demonstrates Time to First Token (TTFT) measurement. Uses gpt-5.4-mini
# with reasoning disabled so TTFT reflects streamed text delivery rather than
# internal deliberation time.

prompts:
  - 'Write a haiku about {{topic}}'
  - 'Explain {{topic}} in one sentence'

providers:
  - id: https://api.openai.com/v1/chat/completions
    config:
      method: 'POST'
      headers:
        'Content-Type': 'application/json'
        'Authorization': 'Bearer {{env.OPENAI_API_KEY}}'
      body:
        model: 'gpt-5.4-mini'
        reasoning_effort: 'none'
        messages:
          - role: 'user'
            content: '{{prompt}}'
        stream: true # Enable streaming for TTFT measurement
      # streamFormat selects a built-in content-token detector so TTFT fires
      # on the first model-emitted content delta rather than the leading SSE
      # framing frame.
      # Omit for the format-agnostic default; use streamFirstTokenPattern
      # instead if your endpoint is not one of the built-in formats.
      streamFormat: openai-chat
      transformResponse: |
        (json, text) => {
          // Handle non-streaming JSON response
          if (json && json.choices?.[0]?.message?.content) {
            return json.choices[0].message.content;
          }

          // Parse OpenAI streaming SSE format
          let content = '';
          for (const line of String(text || '').split('\n')) {
            const trimmed = line.trim();
            if (!trimmed.startsWith('data: ')) continue;
            if (trimmed === 'data: [DONE]') break;

            try {
              const data = JSON.parse(trimmed.slice(6));
              if (data.choices?.[0]?.delta?.content) {
                content += data.choices[0].delta.content;
              }
            } catch {
              // Skip malformed JSON
            }
          }
          return content.trim();
        }

defaultTest:
  assert:
    # Ensure we get meaningful content
    - type: javascript
      value: 'output && output.length > 10'

    # TTFT should be reasonable (under 3 seconds for demo)
    - type: ttft
      threshold: 3000

    # Total latency should be reasonable
    - type: latency
      threshold: 10000

tests:
  - vars:
      topic: 'mountains'
  - vars:
      topic: 'artificial intelligence'
  - vars:
      topic: 'ocean waves'
