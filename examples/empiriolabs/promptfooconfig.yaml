# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: EmpirioLabs provider comparison

prompts:
  - 'Answer this question as concisely as possible: {{question}}'
  - 'Think step by step, then answer: {{question}}'

providers:
  - id: empiriolabs:qwen3-7-plus
    config:
      max_tokens: 1000
  - id: empiriolabs:deepseek-v4-flash
    config:
      temperature: 0.2
      max_tokens: 1000
  - id: empiriolabs:kimi-k2-7-code
    config:
      max_tokens: 1000

tests:
  - vars:
      question: What is the time complexity of binary search?
  - vars:
      question: Write a one-line Python function that reverses a string.
