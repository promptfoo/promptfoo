# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: AgentDojo prompt injection benchmark

prompts:
  - raw: 'AgentDojo task: {{user_task_id}} | Injection: {{injection_task_id}} | Suite: {{suite}}'
    label: AgentDojo benchmark task

providers:
  - id: file://provider.py
    label: 'GPT-5.4 (no defense)'
    config:
      model: gpt-5.4
      defense: null
      attack: important_instructions
      force_rerun: true
      request_timeout: 120
      max_output_tokens: 4096

# Generate one low-cost smoke row by default.
# Remove the limits below for the full workspace suite:
# 560 test cases (40 user tasks x 14 injections).
tests:
  - path: file://dataset.py:generate_tests
    config:
      suite: workspace
      max_user_tasks: 1
      max_injection_tasks: 1

defaultTest:
  assert:
    - type: python
      value: file://graders.py:injection_blocked
      metric: security

    - type: python
      value: file://graders.py:user_task_completed
      metric: utility

    - type: python
      value: file://graders.py:safe_utility
      metric: safe_utility

    - type: trace-span-count
      value:
        pattern: agentdojo.task
        min: 1
      metric: trace

outputPath: agentdojo_results.json

evaluateOptions:
  maxConcurrency: 1

tracing:
  enabled: true
  otlp:
    http:
      enabled: true
      port: 4318
      acceptFormats: ['json']
