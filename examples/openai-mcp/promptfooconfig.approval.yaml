# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: MCP approval workflow examples

prompts:
  - 'Search for information about {{query}} in the {{repo}} repository'
  - 'What are the latest updates in {{repo}}?'

providers:
  # Provider with approval required (default behavior)
  - id: openai:responses:gpt-4.1-2025-04-14
    label: 'With Approval Required'
    config:
      tools:
        - type: mcp
          server_label: deepwiki
          server_url: https://mcp.deepwiki.com/mcp
          # require_approval is not specified, so approval is required by default
      max_output_tokens: 1000
      temperature: 0.2
      instructions: 'You are a research assistant. When approval is required for MCP tools, explain what you would do if the tool were approved.'

  # Provider with selective approval
  - id: openai:responses:gpt-4.1-2025-04-14
    label: 'Selective Approval'
    config:
      tools:
        - type: mcp
          server_label: deepwiki
          server_url: https://mcp.deepwiki.com/mcp
          require_approval:
            never:
              tool_names: ['read_wiki_structure']
          # ask_question will still require approval, but read_wiki_structure won't
      max_output_tokens: 1000
      temperature: 0.2
      instructions: 'You are a research assistant. Use the available tools to gather information.'

  # Provider with no approval required
  - id: openai:responses:gpt-4.1-2025-04-14
    label: 'No Approval Required'
    config:
      tools:
        - type: mcp
          server_label: deepwiki
          server_url: https://mcp.deepwiki.com/mcp
          require_approval: never
      max_output_tokens: 1000
      temperature: 0.2
      instructions: 'You are a research assistant. Use the available MCP tools to search for information.'

tests:
  - vars:
      query: 'getting started guide'
      repo: 'facebook/react'
    assert:
      # Check response content across approval configurations
      - type: contains-any
        value: ['react', 'React', 'would search', 'would look']
      - type: llm-rubric
        value: 'The response provides information about React or explains what would be searched'

  - vars:
      query: 'API documentation'
      repo: 'openai/openai-python'
    assert:
      # Test different approval behaviors across providers
      - type: contains-any
        value: ['API', 'Python', 'client']
      - type: llm-rubric
        value: 'The response mentions API documentation or explains the search intent'

  # Add a test specifically for approval workflow validation
  - vars:
      query: 'installation instructions'
      repo: 'nodejs/node'
    assert:
      # Validate approval policy from the structured Responses API output.
      - type: javascript
        metric: approval_policy_enforced
        value: |
          const rawOutput = context.providerResponse?.raw?.output;
          const label = context.provider?.label;
          const interactions = Array.isArray(rawOutput)
            ? rawOutput.filter(
                (item) =>
                  item &&
                  typeof item === 'object' &&
                  (item.type === 'mcp_call' || item.type === 'mcp_approval_request'),
              )
            : [];
          const wellFormed = interactions.every(
            (item) =>
              typeof item.name === 'string' &&
              item.name.length > 0 &&
              item.server_label === 'deepwiki',
          );
          const matchesPolicy = interactions.every((item) => {
            if (label === 'With Approval Required') {
              return item.type === 'mcp_approval_request';
            }
            if (label === 'No Approval Required') {
              return item.type === 'mcp_call';
            }
            if (label === 'Selective Approval') {
              return item.type ===
                (item.name === 'read_wiki_structure' ? 'mcp_call' : 'mcp_approval_request');
            }
            return false;
          });
          const pass = interactions.length > 0 && wellFormed && matchesPolicy;
          return {
            pass,
            score: pass ? 1 : 0,
            reason: pass
              ? `Observed approval behavior for ${label}.`
              : `Expected approval behavior for ${label}; observed ${JSON.stringify(interactions)}.`,
          };
      # Response relevance across approval configurations
      - type: contains-any
        value: ['installation', 'Node.js', 'setup']
        metric: approval_response_relevance
      # Quality check regardless of approval status
      - type: llm-rubric
        value: 'The response addresses installation, setup, or Node.js information'
        weight: 0.6
