# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Moonshot AI (Kimi) provider demo

prompts:
  - 'In one sentence, summarise: {{passage}}'

# Both models run on a single `MOONSHOT_API_KEY`.
#   - kimi-k3 is Moonshot's flagship Kimi "thinking" model (1M context, always
#     reasoning). It pins temperature and the other sampling params to fixed
#     values, so the provider sends no sampling defaults for kimi-* models —
#     just leave them unset. `showThinking: false` keeps its reasoning out of
#     the graded answer.
#   - kimi-k2.6 is the cheaper previous-generation thinking model; here we turn
#     its reasoning off entirely via the K2.x-only `thinking` passthrough for a
#     fast, low-cost comparison point.
# (The legacy moonshot-v1 generation models are closed to new accounts and
# sunset on August 31, 2026, so this example sticks to the Kimi models.)
providers:
  - id: moonshot:kimi-k3
    label: 'Kimi K3'
    config:
      showThinking: false
  - id: moonshot:kimi-k2.6
    label: 'Kimi K2.6 (thinking off)'
    config:
      passthrough:
        thinking: { type: disabled }

tests:
  - vars:
      passage: |
        On the surface, the Antikythera mechanism was a corroded lump of bronze pulled from a Roman-era
        shipwreck off Greece in 1901. Decades of x-ray and tomographic analysis revealed it to be an
        intricate analogue computer, with dozens of geared dials that tracked the Sun and Moon, predicted
        eclipses, and modelled the irregular motion of the lunar orbit using an epicyclic gear train.
    assert:
      - type: icontains
        value: Antikythera
      - type: icontains-any
        value: [mechanism, computer, gears, astronomical]
  - vars:
      passage: |
        Edsger Dijkstra argued that programs should be derived from their specifications through a
        chain of small, verifiable steps. He took particular issue with the unrestricted use of GOTO,
        which he believed encouraged jumping around in code in ways that made formal reasoning about
        program correctness much harder than it needed to be.
    assert:
      - type: icontains-any
        value: [Dijkstra, GOTO, correctness, specification]
