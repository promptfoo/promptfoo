# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: Google Vertex AI Search grounding demonstration

prompts:
  - '{{query}}'

providers:
  - id: vertex:gemini-3.6-flash
    label: gemini-3.6-flash-search
    config:
      region: global
      maxOutputTokens: 1024
      tools:
        - googleSearch: {}
  - id: vertex:gemini-3.5-flash-lite
    label: gemini-3.5-flash-lite-search-thinking
    config:
      region: global
      maxOutputTokens: 1024
      generationConfig:
        thinkingConfig:
          thinkingLevel: MEDIUM
      tools:
        - googleSearch: {}

tests:
  # Test current events
  - vars:
      query: What is the current Google stock price?
    assert:
      - type: icontains-any
        value: [Alphabet, Google, GOOG, GOOGL]
      - type: contains
        value: '$'

  # Test a technical question
  - vars:
      query: What are the latest features in Python 3.13?
    assert:
      - type: icontains
        value: Python
      - type: icontains-any
        value: [feature, support, PEP, experimental, release]

  # Test a factual question
  - vars:
      query: Who won the latest Formula 1 Grand Prix?
    assert:
      - type: icontains-any
        value: [Formula 1, F1, Grand Prix]
      - type: icontains-any
        value: [won, winner, victory, first place, 1st]

  # Test with weather information
  - vars:
      query: What is the current weather in Tokyo?
    assert:
      - type: icontains
        value: Tokyo
      - type: icontains-any
        value: [weather, temperature, forecast, sunny, cloudy, rain, °C, °F]
