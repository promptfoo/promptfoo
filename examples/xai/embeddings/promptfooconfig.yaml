# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: xAI embeddings for semantic similarity

prompts:
  - 'Answer in one word: What color are {{item}}?'

providers:
  - xai:grok-4.3

defaultTest:
  options:
    provider:
      embedding: xai:embedding:v1

tests:
  - vars:
      item: bananas
    assert:
      - type: similar
        value: yellow
