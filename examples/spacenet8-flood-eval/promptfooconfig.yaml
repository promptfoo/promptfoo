# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: SpaceNet 8 one-pair multimodal smoke test
sharing: false
tags:
  dataset: spacenet8
  domain: geospatial
  modality: paired-imagery
  suite: one-pair-smoke-test

prompts:
  - label: Paired flood assessment
    raw: file://prompt.json

providers:
  - id: openai:chat:gpt-5.4-mini
    label: OpenAI gpt-5.4-mini vision
    config:
      max_completion_tokens: 600
      response_format:
        type: json_schema
        json_schema:
          name: flood_assessment
          strict: true
          schema: file://response-schema.json

defaultTest:
  assert:
    - type: is-json
      value: file://response-schema.json
      metric: schema_contract

tests:
  - description: Germany pre/post image pair
    metadata:
      geography: Germany
    vars:
      tile_id: germany-0-41-59
      pre_image: file://assets/germany-0-41-59/pre.jpg
      post_image: file://assets/germany-0-41-59/post.jpg
