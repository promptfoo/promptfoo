# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Compare GPT-5.5 and GPT-5.4 Mini on SpaceNet 8
sharing: false
tags:
  dataset: spacenet8
  domain: geospatial
  modality: paired-imagery
  suite: openai-model-comparison

prompts:
  - label: Paired flood assessment
    raw: file://prompt.json

providers:
  - id: openai:chat:gpt-5.5
    label: GPT-5.5
    config:
      max_completion_tokens: 600
      response_format:
        type: json_schema
        json_schema:
          name: flood_assessment
          strict: true
          schema: file://response-schema.json
  - id: openai:chat:gpt-5.4-mini
    label: GPT-5.4 Mini
    config:
      max_completion_tokens: 600
      response_format:
        type: json_schema
        json_schema:
          name: flood_assessment
          strict: true
          schema: file://response-schema.json

defaultTest:
  assert:
    - type: is-json
      value: file://response-schema.json
      metric: schema_contract
    - type: javascript
      value: file://grader.cjs:gradeFloodAssessment
      threshold: 1
      metric: labeled_accuracy

tests: file://scripts/generate_tests.py:generate_tests
