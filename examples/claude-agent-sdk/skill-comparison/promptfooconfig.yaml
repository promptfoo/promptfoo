# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Compare Claude skill versions

prompts:
  - '{{request}}'

# YAML anchor for the review-output schema. `output_format` is the Claude
# Agent SDK's structured-output knob — without it the model commonly wraps
# short JSON answers in Markdown fences and the JS assertion's JSON.parse
# throws. Both providers must enforce the same shape so the assertion can
# compare issue ids without per-provider parsing branches.
x-review-schema: &reviewSchema
  type: json_schema
  schema:
    type: object
    required: [summary, issues]
    additionalProperties: false
    properties:
      summary:
        type: string
      issues:
        type: array
        items:
          type: object
          required: [id, severity]
          additionalProperties: false
          properties:
            id:
              type: string
            severity:
              type: string
              enum: [high, medium, low]

providers:
  - id: anthropic:claude-agent-sdk
    label: review-standards-v1
    config:
      model: claude-sonnet-4-6
      working_dir: ./fixtures/v1
      setting_sources: ['project']
      skills: ['review-standards']
      append_allowed_tools: ['Read', 'Grep', 'Glob']
      output_format: *reviewSchema

  - id: anthropic:claude-agent-sdk
    label: review-standards-v2
    config:
      model: claude-sonnet-4-6
      working_dir: ./fixtures/v2
      setting_sources: ['project']
      skills: ['review-standards']
      append_allowed_tools: ['Read', 'Grep', 'Glob']
      output_format: *reviewSchema

defaultTest:
  # Without `disableVarExpansion`, Promptfoo would fan each YAML-list var into
  # one test case per element (src/evaluator.ts:generateVarCombinations), which
  # would split each comparison test in two.
  options:
    disableVarExpansion: true
  assert:
    - type: skill-used
      value: review-standards

    - type: javascript
      threshold: 0.7
      value: |
        // The provider returns a parsed object when `output_format` is set
        // and a string otherwise; handle both.
        const result = typeof output === 'string' ? JSON.parse(output) : output;
        const expected = context.vars.expectedIssues;
        const found = (result.issues || []).map((issue) => issue.id);
        const hits = expected.filter((id) => found.includes(id));
        const recall = hits.length / expected.length;

        return {
          pass: recall >= 0.75,
          score: recall,
          reason: `matched ${hits.length}/${expected.length} expected issues`,
        };

tests:
  - description: Finds password handling issues
    vars:
      request: Review src/auth.ts for password handling security issues.
      expectedIssues:
        - weak-password-hash
        - timing-unsafe-compare

  - description: Finds the most important issue
    vars:
      request: Review src/auth.ts and report only the highest-risk auth issue.
      expectedIssues:
        - weak-password-hash
