include:
  - local: gitlab-ci.yml

promptfoo-eval:
  extends: .promptfoo-eval
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - .gitlab-ci.yml
        - gitlab-ci.yml
        - promptfooconfig.yaml
        - prompts/**/*
        - tests/**/*
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
