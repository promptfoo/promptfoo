# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: GPT-5.3 Instant Reasoning Comparison
prompts:
  - |
    {{question}}

providers:
  - id: openai:responses:gpt-5.3-chat-latest
    label: gpt-5.3-instant-minimal-reasoning
    config:
      reasoning:
        effort: 'minimal'
      max_output_tokens: 2000

  - id: openai:responses:gpt-5.3-chat-latest
    label: gpt-5.3-instant-medium-reasoning
    config:
      reasoning:
        effort: 'medium'
      max_output_tokens: 2000

  - id: openai:responses:gpt-5.3-chat-latest
    label: gpt-5.3-instant-high-reasoning
    config:
      reasoning:
        effort: 'high'
      max_output_tokens: 4000

tests:
  - vars:
      question: 'Explain the difference between TCP and UDP. When would you choose one over the other?'
    assert:
      - type: javascript
        value: output.toLowerCase().includes('tcp') && output.toLowerCase().includes('udp')
      - type: llm-rubric
        value: 'Response clearly explains key differences between TCP and UDP protocols'

  - vars:
      question: 'What causes tides on Earth? Explain the role of the Moon and Sun.'
    assert:
      - type: contains-any
        value:
          - moon
          - Moon
      - type: llm-rubric
        value: 'Response accurately describes gravitational effects causing tides'

  - vars:
      question: 'Write a Python function that checks if a string is a valid IPv4 address without using the ipaddress module.'
    assert:
      - type: javascript
        value: output.toLowerCase().includes('def ') || output.includes('function')
      - type: llm-rubric
        value: 'Solution correctly validates IPv4 addresses'
