# Codecov configuration for promptfoo
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        # Overall coverage is gated in-repo by the coverage ratchet
        # (`npm run test:coverage:ratchet`, run in CI as the "Check Backend/
        # Frontend Coverage Ratchets" steps), not by Codecov. Keep this status
        # informational so Codecov measurement noise — carryforward flags,
        # sharded/partial uploads — can't fail PRs that don't change source
        # (e.g. a dependency bump reporting a spurious -0.01%).
        target: auto
        threshold: 0%
        informational: true
    patch:
      default:
        # Require new code in PRs to have reasonable coverage
        target: 50%
        threshold: 0%
        informational: false

comment:
  layout: 'header, diff, flags, components'
  behavior: default
  require_changes: false

# Ignore generated files and test files in coverage reports
ignore:
  - 'dist/**/*'
  - 'coverage/**/*'
  - 'node_modules/**/*'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - '**/*.d.ts'
  - 'src/app/**/*' # Frontend has separate coverage
  - 'examples/**/*'
  - 'drizzle/**/*'
  - 'scripts/**/*'

# Component flags for separate coverage tracking
flag_management:
  default_rules:
    carryforward: true
    statuses:
      # Per-flag project status is informational for the same reason as the
      # default project status above: overall coverage is gated by the in-repo
      # ratchet, so this status only needs to surface info, not block merges.
      - type: project
        target: auto
        threshold: 0%
        informational: true
      - type: patch
        target: 50%

flags:
  backend:
    paths:
      - src/
    carryforward: true
  frontend:
    paths:
      - src/app/src/
    carryforward: true
  site:
    paths:
      - site/src/
    carryforward: true
