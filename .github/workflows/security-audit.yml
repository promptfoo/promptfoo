name: Security Audit

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'

      - name: Audit dependency lockfile
        run: npm audit --registry=https://registry.npmjs.org/ --package-lock-only --audit-level=high
