name: release-please-format
run-name: format CHANGELOG on release PR (${{ github.event.pull_request.head.ref }})

# Runs prettier on CHANGELOG files in release-please PRs. Lives in its own
# workflow (not inside release-please.yml) so it re-runs on every PR
# synchronize event — release-please force-pushes its PR branch when new
# commits land on main, which would wipe any formatting commit created
# inline in the release-please job.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/CHANGELOG.md'

permissions:
  contents: read

jobs:
  format:
    # 'release-please--' is the branch prefix release-please-action always uses.
    if: startsWith(github.event.pull_request.head.ref, 'release-please--')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        id: app-token
        with:
          app-id: ${{ vars.PROMPTFOOBOT_APP_ID }}
          private-key: ${{ secrets.PROMPTFOOBOT_APP_PRIVATE_KEY }}

      # persist-credentials: false keeps the app token out of .git/config so
      # it can't be harvested by postinstall scripts during the prettier
      # install below. Auth is reattached just-in-time to the final `git push`.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.nvmrc'

      # Skip full monorepo `npm ci` — prettier is all we need. `--ignore-scripts`
      # blocks arbitrary postinstall code from running under the app token scope.
      - run: npm install --no-save --no-audit --no-fund --ignore-scripts prettier@^3.8.1

      - name: Format CHANGELOG files
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          # Ensure base ref is available locally before diffing — actions/checkout
          # with fetch-depth: 0 fetches history of the head ref, not other branches.
          git fetch --no-tags --prune origin "${BASE_REF}"

          # Capture diff output separately so a failing `git diff` does not get
          # swallowed by `|| true` on the downstream grep pipeline.
          changed_paths="$(git diff --name-only --diff-filter=ACMRT "origin/${BASE_REF}...HEAD")"

          mapfile -t changelog_files < <(
            printf '%s\n' "$changed_paths" | grep -E '(^|/)CHANGELOG\.md$' || true
          )

          if [[ "${#changelog_files[@]}" -eq 0 ]]; then
            echo "No CHANGELOG files changed in release PR"
            exit 0
          fi

          npx prettier --write "${changelog_files[@]}"

          if git diff --quiet -- "${changelog_files[@]}"; then
            echo "No formatting changes needed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${changelog_files[@]}"
          git commit -m "chore: format CHANGELOG files with prettier"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: bearer ${GH_TOKEN}" \
            push origin "HEAD:${HEAD_REF}"
