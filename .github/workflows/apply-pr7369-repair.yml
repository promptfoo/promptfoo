name: Apply validated PR 7369 drawer repair

on:
  push:
    branches:
      - feat/config-agent-interactive-setup

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out staged repair
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Apply exact validated drawer patch
        shell: bash
        run: |
          set -euo pipefail
          cat .codex/pr7369-drawer/part-* > /tmp/pr7369-drawer.patch
          echo "336b5c26980a4ae87d604b99cb8834854f505fe20980b61c3642d6273489a9b8  /tmp/pr7369-drawer.patch" | sha256sum -c -
          git apply --index --check /tmp/pr7369-drawer.patch
          git apply --index /tmp/pr7369-drawer.patch
          git diff --cached --binary HEAD > /tmp/pr7369-drawer-staged.patch
          echo "336b5c26980a4ae87d604b99cb8834854f505fe20980b61c3642d6273489a9b8  /tmp/pr7369-drawer-staged.patch" | sha256sum -c -

      - name: Commit and push exact repair
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -c core.hooksPath=/dev/null commit -m "fix(redteam): align configuration agent error handling"
          basic_auth="$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 | tr -d '\n')"
          git -c core.hooksPath=/dev/null \
            -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${basic_auth}" \
            push origin HEAD:refs/heads/feat/config-agent-interactive-setup
