<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">GPT-5.4 versus GPT-5.2 comparison summary</title>
  <desc id="desc">Two aligned cards compare regenerated-corpus rerun results and fixed prompt-payload replay results for Hydra, Meta, and Baseline. GPT-5.4 improves on the rerun but weakens on the fixed replay.</desc>
  <defs>
    <style>
      .bg { fill: #f6f1e7; }
      .panel { fill: #fffaf3; stroke: #d9cfbe; stroke-width: 2; }
      .panel-good { fill: #f4fbf8; stroke: #8eb7ac; stroke-width: 2; }
      .panel-bad { fill: #fff6ef; stroke: #d6a179; stroke-width: 2; }
      .ink { fill: #1f2937; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #667085; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 16px; }
      .section { font-size: 22px; font-weight: 700; }
      .legend { font-size: 14px; font-weight: 600; }
      .row { font-size: 17px; font-weight: 700; }
      .value { font-size: 13px; font-weight: 600; }
      .chip-label { font-size: 15px; font-weight: 700; }
      .tick { font-size: 12px; }
      .middle { dominant-baseline: middle; }
      .center { text-anchor: middle; dominant-baseline: middle; }
      .axis { stroke: #d5d9df; stroke-width: 1; }
      .divider { stroke: #e6ded0; stroke-width: 1; }
      .baseline { fill: #4b5563; }
      .model { fill: #0f766e; }
      .model-worse { fill: #c2410c; }
      .chip-good { fill: #d8f1e9; }
      .chip-bad { fill: #fde3d2; }
      .chip-neutral { fill: #ebe6db; }
      .footer { fill: #f0eadf; stroke: #d8cfbf; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="780" rx="24" />

  <text class="ink title" x="60" y="72">Two Comparisons, Two Answers</text>
  <text class="muted subtitle" x="60" y="104">Same settings, same model pair, different methodology. The rerun says GPT-5.4 got harder to break. The fixed replay says it got looser on saved prompt payloads.</text>

  <rect class="panel" x="810" y="44" width="330" height="78" rx="18" />
  <rect class="baseline" x="836" y="68" width="18" height="10" rx="5" />
  <text class="ink legend middle" x="864" y="73">GPT-5.2</text>
  <rect class="model" x="948" y="56" width="18" height="10" rx="5" />
  <text class="ink legend middle" x="976" y="61">GPT-5.4 lower ASR</text>
  <rect class="model-worse" x="948" y="84" width="18" height="10" rx="5" />
  <text class="ink legend middle" x="976" y="89">GPT-5.4 higher ASR</text>

  <rect class="panel-good" x="40" y="150" width="540" height="540" rx="28" />
  <rect class="panel-bad" x="620" y="150" width="540" height="540" rx="28" />

  <g transform="translate(70 180)">
    <text class="ink section" x="0" y="0">Adaptive rerun</text>
    <text class="muted subtitle" x="0" y="28">Re-run the December GPT-5.2 methodology on GPT-5.4</text>
    <rect class="chip-good" x="365" y="-16" width="118" height="34" rx="17" />
    <text class="ink chip-label center" x="424" y="1">safer overall</text>

    <g transform="translate(0 82)">
      <text class="muted tick middle" x="0" y="-8">0%</text>
      <text class="muted tick middle center" x="75" y="-8">25%</text>
      <text class="muted tick middle center" x="150" y="-8">50%</text>
      <text class="muted tick middle center" x="225" y="-8">75%</text>
      <text class="muted tick middle" x="300" y="-8" text-anchor="end">100%</text>
      <line class="axis" x1="0" y1="0" x2="300" y2="0" />
      <line class="axis" x1="0" y1="128" x2="300" y2="128" />
      <line class="axis" x1="0" y1="256" x2="300" y2="256" />
      <line class="divider" x1="0" y1="92" x2="462" y2="92" />
      <line class="divider" x1="0" y1="220" x2="462" y2="220" />

      <text class="ink row middle" x="0" y="22">Hydra</text>
      <rect class="baseline" x="0" y="42" width="236" height="16" rx="8" />
      <rect class="model" x="0" y="66" width="57" height="16" rx="8" />
      <text class="ink value middle" x="312" y="50">GPT-5.2 78.5%</text>
      <text class="ink value middle" x="312" y="74">GPT-5.4 19.0%</text>
      <rect class="chip-good" x="354" y="34" width="96" height="40" rx="20" />
      <text class="ink chip-label center" x="402" y="54">-59.5pp</text>

      <text class="ink row middle" x="0" y="150">Meta</text>
      <rect class="baseline" x="0" y="170" width="183" height="16" rx="8" />
      <rect class="model" x="0" y="194" width="96" height="16" rx="8" />
      <text class="ink value middle" x="312" y="178">GPT-5.2 61.0%</text>
      <text class="ink value middle" x="312" y="202">GPT-5.4 31.9%</text>
      <rect class="chip-good" x="354" y="162" width="96" height="40" rx="20" />
      <text class="ink chip-label center" x="402" y="182">-29.1pp</text>

      <text class="ink row middle" x="0" y="278">Baseline</text>
      <rect class="baseline" x="0" y="298" width="13" height="16" rx="8" />
      <rect class="model" x="0" y="322" width="10" height="16" rx="8" />
      <text class="ink value middle" x="312" y="306">GPT-5.2 4.3%</text>
      <text class="ink value middle" x="312" y="330">GPT-5.4 3.3%</text>
      <rect class="chip-neutral" x="354" y="290" width="96" height="40" rx="20" />
      <text class="ink chip-label center" x="402" y="310">-1.0pp</text>
    </g>
  </g>

  <g transform="translate(650 180)">
    <text class="ink section" x="0" y="0">Fixed prompt-payload replay</text>
    <text class="muted subtitle" x="0" y="28">Replay the saved March 6 prompt payloads against both models</text>
    <rect class="chip-bad" x="372" y="-16" width="94" height="34" rx="17" />
    <text class="ink chip-label center" x="419" y="1">looser</text>

    <g transform="translate(0 82)">
      <text class="muted tick middle" x="0" y="-8">0%</text>
      <text class="muted tick middle center" x="75" y="-8">25%</text>
      <text class="muted tick middle center" x="150" y="-8">50%</text>
      <text class="muted tick middle center" x="225" y="-8">75%</text>
      <text class="muted tick middle" x="300" y="-8" text-anchor="end">100%</text>
      <line class="axis" x1="0" y1="0" x2="300" y2="0" />
      <line class="axis" x1="0" y1="128" x2="300" y2="128" />
      <line class="axis" x1="0" y1="256" x2="300" y2="256" />
      <line class="divider" x1="0" y1="92" x2="462" y2="92" />
      <line class="divider" x1="0" y1="220" x2="462" y2="220" />

      <text class="ink row middle" x="0" y="22">Hydra</text>
      <rect class="baseline" x="0" y="42" width="41" height="16" rx="8" />
      <rect class="model-worse" x="0" y="66" width="47" height="16" rx="8" />
      <text class="ink value middle" x="312" y="50">GPT-5.2 13.8%</text>
      <text class="ink value middle" x="312" y="74">GPT-5.4 15.7%</text>
      <rect class="chip-bad" x="354" y="34" width="88" height="40" rx="20" />
      <text class="ink chip-label center" x="398" y="54">+1.9pp</text>

      <text class="ink row middle" x="0" y="150">Meta</text>
      <rect class="baseline" x="0" y="170" width="62" height="16" rx="8" />
      <rect class="model-worse" x="0" y="194" width="74" height="16" rx="8" />
      <text class="ink value middle" x="312" y="178">GPT-5.2 20.5%</text>
      <text class="ink value middle" x="312" y="202">GPT-5.4 24.8%</text>
      <rect class="chip-bad" x="354" y="162" width="88" height="40" rx="20" />
      <text class="ink chip-label center" x="398" y="182">+4.3pp</text>

      <text class="ink row middle" x="0" y="278">Baseline</text>
      <rect class="baseline" x="0" y="298" width="10" height="16" rx="8" />
      <rect class="model-worse" x="0" y="322" width="15" height="16" rx="8" />
      <text class="ink value middle" x="312" y="306">GPT-5.2 3.3%</text>
      <text class="ink value middle" x="312" y="330">GPT-5.4 5.1%</text>
      <rect class="chip-bad" x="354" y="290" width="88" height="40" rx="20" />
      <text class="ink chip-label center" x="398" y="310">+1.8pp</text>
    </g>
  </g>

  <rect class="footer" x="210" y="716" width="780" height="38" rx="19" />
  <text class="ink legend center" x="600" y="735">High-severity direct harm got quieter in the rerun. Representation, politics, and related prompts got looser on fixed payloads.</text>
</svg>
