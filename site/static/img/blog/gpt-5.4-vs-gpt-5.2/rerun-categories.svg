<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">Selected GPT-5.4 rerun categories</title>
  <desc id="desc">A heatmap of selected GPT-5.4 rerun category failures across baseline, Hydra, and Meta.</desc>
  <defs>
    <style>
      .bg { fill: #f7f2e8; }
      .panel { fill: #fffaf2; stroke: #d8cfbf; stroke-width: 2; }
      .ink { fill: #1f2937; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #667085; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 16px; }
      .header { font-size: 18px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 600; }
      .small { font-size: 13px; }
      .divider { stroke: #e3dccf; stroke-width: 2; }
      .c0 { fill: #dff6e8; }
      .c1 { fill: #eaf3d9; }
      .c2 { fill: #f7e8bd; }
      .c3 { fill: #f8d29b; }
      .c4 { fill: #f4ad82; }
      .c5 { fill: #ea7b67; }
      .good-badge { fill: #d8f1e9; }
      .bad-badge { fill: #fde3d2; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="860" rx="24" />
  <rect class="panel" x="40" y="40" width="1120" height="780" rx="28" />

  <text class="ink title" x="80" y="100">Where GPT-5.4 Still Broke on the Rerun</text>
  <text class="muted subtitle" x="80" y="132">Failure counts out of 5 attacks for selected categories in the GPT-5.4 adaptive rerun.</text>

  <rect class="bad-badge" x="80" y="160" width="220" height="36" rx="18" />
  <text class="ink label" x="190" y="183" text-anchor="middle">still weak</text>
  <rect class="good-badge" x="320" y="160" width="250" height="36" rx="18" />
  <text class="ink label" x="445" y="183" text-anchor="middle">direct harm improved</text>

  <text class="ink header" x="670" y="230">Baseline</text>
  <text class="ink header" x="815" y="230">Hydra</text>
  <text class="ink header" x="960" y="230">Meta</text>

  <g transform="translate(80 260)">
    <text class="ink label" x="0" y="38">imitation</text>
    <rect class="c3" x="560" y="0" width="110" height="56" rx="18" />
    <text class="ink label" x="615" y="36" text-anchor="middle">3/5</text>
    <rect class="c5" x="705" y="0" width="110" height="56" rx="18" />
    <text class="ink label" x="760" y="36" text-anchor="middle">5/5</text>
    <rect class="c5" x="850" y="0" width="110" height="56" rx="18" />
    <text class="ink label" x="905" y="36" text-anchor="middle">5/5</text>

    <text class="ink label" x="0" y="118">harmful:insults</text>
    <rect class="c0" x="560" y="80" width="110" height="56" rx="18" />
    <text class="ink label" x="615" y="116" text-anchor="middle">0/5</text>
    <rect class="c4" x="705" y="80" width="110" height="56" rx="18" />
    <text class="ink label" x="760" y="116" text-anchor="middle">4/5</text>
    <rect class="c5" x="850" y="80" width="110" height="56" rx="18" />
    <text class="ink label" x="905" y="116" text-anchor="middle">5/5</text>

    <text class="ink label" x="0" y="198">politics</text>
    <rect class="c0" x="560" y="160" width="110" height="56" rx="18" />
    <text class="ink label" x="615" y="196" text-anchor="middle">0/5</text>
    <rect class="c0" x="705" y="160" width="110" height="56" rx="18" />
    <text class="ink label" x="760" y="196" text-anchor="middle">0/5</text>
    <rect class="c5" x="850" y="160" width="110" height="56" rx="18" />
    <text class="ink label" x="905" y="196" text-anchor="middle">5/5</text>

    <text class="ink label" x="0" y="278">harmful:specialized-advice</text>
    <rect class="c1" x="560" y="240" width="110" height="56" rx="18" />
    <text class="ink label" x="615" y="276" text-anchor="middle">1/5</text>
    <rect class="c3" x="705" y="240" width="110" height="56" rx="18" />
    <text class="ink label" x="760" y="276" text-anchor="middle">3/5</text>
    <rect class="c5" x="850" y="240" width="110" height="56" rx="18" />
    <text class="ink label" x="905" y="276" text-anchor="middle">5/5</text>

    <text class="ink label" x="0" y="358">contracts</text>
    <rect class="c0" x="560" y="320" width="110" height="56" rx="18" />
    <text class="ink label" x="615" y="356" text-anchor="middle">0/5</text>
    <rect class="c3" x="705" y="320" width="110" height="56" rx="18" />
    <text class="ink label" x="760" y="356" text-anchor="middle">3/5</text>
    <rect class="c3" x="850" y="320" width="110" height="56" rx="18" />
    <text class="ink label" x="905" y="356" text-anchor="middle">3/5</text>

    <text class="ink label" x="0" y="438">coppa</text>
    <rect class="c1" x="560" y="400" width="110" height="56" rx="18" />
    <text class="ink label" x="615" y="436" text-anchor="middle">1/5</text>
    <rect class="c3" x="705" y="400" width="110" height="56" rx="18" />
    <text class="ink label" x="760" y="436" text-anchor="middle">3/5</text>
    <rect class="c2" x="850" y="400" width="110" height="56" rx="18" />
    <text class="ink label" x="905" y="436" text-anchor="middle">2/5</text>

    <line class="divider" x1="0" y1="500" x2="960" y2="500" />

    <text class="ink label" x="0" y="578">harmful:illegal-drugs</text>
    <rect class="c0" x="560" y="540" width="110" height="56" rx="18" />
    <text class="ink label" x="615" y="576" text-anchor="middle">0/5</text>
    <rect class="c0" x="705" y="540" width="110" height="56" rx="18" />
    <text class="ink label" x="760" y="576" text-anchor="middle">0/5</text>
    <rect class="c0" x="850" y="540" width="110" height="56" rx="18" />
    <text class="ink label" x="905" y="576" text-anchor="middle">0/5</text>

    <text class="ink label" x="0" y="658">harmful:child-exploitation</text>
    <rect class="c0" x="560" y="620" width="110" height="56" rx="18" />
    <text class="ink label" x="615" y="656" text-anchor="middle">0/5</text>
    <rect class="c0" x="705" y="620" width="110" height="56" rx="18" />
    <text class="ink label" x="760" y="656" text-anchor="middle">0/5</text>
    <rect class="c0" x="850" y="620" width="110" height="56" rx="18" />
    <text class="ink label" x="905" y="656" text-anchor="middle">0/5</text>
  </g>

  <g transform="translate(800 755)">
    <text class="muted small" x="0" y="0">Legend</text>
    <rect class="c0" x="56" y="-18" width="28" height="18" rx="8" />
    <text class="muted small" x="91" y="-4">0/5</text>
    <rect class="c2" x="130" y="-18" width="28" height="18" rx="8" />
    <text class="muted small" x="165" y="-4">2/5</text>
    <rect class="c3" x="204" y="-18" width="28" height="18" rx="8" />
    <text class="muted small" x="239" y="-4">3/5</text>
    <rect class="c5" x="278" y="-18" width="28" height="18" rx="8" />
    <text class="muted small" x="313" y="-4">5/5</text>
