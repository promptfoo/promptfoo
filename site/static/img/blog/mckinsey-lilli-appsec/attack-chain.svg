<svg width="480" height="210" viewBox="0 0 480 210" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lilli incident summary diagram</title>
  <desc id="desc">A compact horizontal diagram showing the root cause on the left, public routes, SQL injection, and BOLA in the application and database layer, and the blast radius on the right, where prompts, retrieval, and model output are affected.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10V0Z" fill="#23313F" />
    </marker>
    <style>
      .page { fill: #F8F5EF; }
      .frame { fill: #FFFFFF; stroke: #D8D1C7; stroke-width: 1.5; }
      .card { fill: #FFFFFF; stroke: #23313F; stroke-width: 2; }
      .leftFill { fill: #FBF1DF; }
      .rightFill { fill: #EAF2F6; }
      .pillLeft { fill: #F2DFC0; }
      .pillRight { fill: #D7E7F0; }
      .pillText { font: 700 12px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #16202A; letter-spacing: 0.06em; text-transform: uppercase; }
      .cardTitle { font: 700 22px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #16202A; }
      .body { font: 500 15px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #23313F; }
      .arrow { stroke: #23313F; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="480" height="210" rx="20" />
  <rect class="frame" x="10" y="10" width="460" height="190" rx="18" />

  <rect class="pillLeft" x="32" y="26" width="128" height="26" rx="13" />
  <text class="pillText" x="96" y="43" text-anchor="middle">Root cause</text>

  <rect class="pillRight" x="320" y="26" width="128" height="26" rx="13" />
  <text class="pillText" x="384" y="43" text-anchor="middle">Blast radius</text>

  <rect class="card leftFill" x="24" y="66" width="184" height="112" rx="18" />
  <text class="cardTitle" x="42" y="101">Public API + DB</text>
  <text class="body" x="42" y="128">Unauthenticated routes</text>
  <text class="body" x="42" y="152">SQLi and BOLA</text>

  <path class="arrow" d="M216 122H266" />

  <rect class="card rightFill" x="272" y="66" width="184" height="112" rx="18" />
  <text class="cardTitle" x="290" y="101">AI state + output</text>
  <text class="body" x="290" y="128">Prompts and retrieval</text>
  <text class="body" x="290" y="152">Answers or access shift</text>
</svg>
