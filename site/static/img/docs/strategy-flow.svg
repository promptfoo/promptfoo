<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">Red team plugin and strategy flow</title>
  <desc id="desc">A plugin defines the test objective and generates payloads, a strategy transforms or adapts those payloads, and the resulting variants are sent to the target.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#64748b" /></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
      .title { font-size: 24px; font-weight: 700; }
      .heading { font-size: 17px; font-weight: 600; }
      .body { font-size: 14px; fill: #475569; }
    </style>
  </defs>
  <rect width="920" height="300" fill="#ffffff" />
  <text class="title" x="460" y="42" text-anchor="middle">How red team strategies shape test inputs</text>
  <rect x="30" y="108" width="190" height="108" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" />
  <text class="heading" x="125" y="140" text-anchor="middle">Plugin</text>
  <text class="body" x="125" y="166" text-anchor="middle">Defines the objective</text>
  <text class="body" x="125" y="186" text-anchor="middle">and generates payloads</text>
  <path d="M220 162H260" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="260" y="108" width="180" height="108" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" />
  <text class="heading" x="350" y="140" text-anchor="middle">Payloads</text>
  <text class="body" x="350" y="166" text-anchor="middle">Representative test</text>
  <text class="body" x="350" y="186" text-anchor="middle">inputs for the objective</text>
  <path d="M440 162H480" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="480" y="108" width="210" height="108" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text class="heading" x="585" y="140" text-anchor="middle">Strategy variants</text>
  <text class="body" x="585" y="166" text-anchor="middle">Transform, adapt, or</text>
  <text class="body" x="585" y="186" text-anchor="middle">sequence the payloads</text>
  <path d="M690 162H730" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="730" y="108" width="160" height="108" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
  <text class="heading" x="810" y="140" text-anchor="middle">Target</text>
  <text class="body" x="810" y="166" text-anchor="middle">Receives the</text>
  <text class="body" x="810" y="186" text-anchor="middle">adversarial inputs</text>
</svg>
