<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 410" role="img" aria-labelledby="title desc">
  <title id="title">Layered testing for LLM agents</title>
  <desc id="desc">Black-box, component, and trace-based tests provide complementary views of an LLM agent's behavior.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#94a3b8" /></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
      .title { font-size: 24px; font-weight: 700; }
      .heading { font-size: 18px; font-weight: 600; }
      .body { font-size: 14px; fill: #475569; }
      .tag { font-size: 14px; font-weight: 600; }
    </style>
  </defs>
  <rect width="920" height="410" fill="#ffffff" />
  <text class="title" x="460" y="42" text-anchor="middle">Layered testing for LLM agents</text>
  <rect x="70" y="76" width="780" height="84" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text class="heading" x="96" y="107">Black-box testing</text>
  <text class="body" x="96" y="132">Test the complete agent through its normal user-facing interface.</text>
  <text class="tag" x="825" y="107" text-anchor="end" fill="#1d4ed8">End-to-end</text>
  <path d="M460 160V182" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="70" y="184" width="780" height="84" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" />
  <text class="heading" x="96" y="215">Component testing</text>
  <text class="body" x="96" y="240">Probe individual tools, guardrails, and other agent components directly.</text>
  <text class="tag" x="825" y="215" text-anchor="end" fill="#6d28d9">Direct hooks</text>
  <path d="M460 268V290" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="70" y="292" width="780" height="84" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="heading" x="96" y="323">Trace-based testing</text>
  <text class="body" x="96" y="348">Use OpenTelemetry traces to connect failures with internal agent behavior.</text>
  <text class="tag" x="825" y="323" text-anchor="end" fill="#c2410c">Glass box</text>
</svg>
