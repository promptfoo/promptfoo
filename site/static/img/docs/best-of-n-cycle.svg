<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" role="img" aria-labelledby="title desc">
  <title id="title">Best-of-N candidate selection flow</title>
  <desc id="desc">Promptfoo generates text candidates, calls the target, returns the first response without an error for grading, or tries the next candidate until none remain.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0L10 4L0 8Z" fill="#64748b" />
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
      .title { font-size: 24px; font-weight: 700; }
      .heading { font-size: 17px; font-weight: 600; }
      .body { font-size: 14px; fill: #475569; }
      .label { font-size: 14px; font-weight: 600; }
      .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="920" height="400" fill="#ffffff" />
  <text class="title" x="460" y="42" text-anchor="middle">Best-of-N candidate selection</text>

  <rect x="35" y="105" width="200" height="122" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text class="heading" x="135" y="136" text-anchor="middle">Generate candidates</text>
  <text class="body" x="55" y="166">• Random capitalization</text>
  <text class="body" x="55" y="188">• Character scrambling</text>
  <text class="body" x="55" y="210">• ASCII noising</text>

  <path class="arrow" d="M235 166H275" />
  <rect x="275" y="122" width="175" height="88" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" />
  <text class="heading" x="362" y="152" text-anchor="middle">Call target</text>
  <text class="body" x="362" y="176" text-anchor="middle">Up to the configured</text>
  <text class="body" x="362" y="196" text-anchor="middle">concurrency limit</text>

  <path class="arrow" d="M450 166H500" />
  <path d="M575 108L650 166L575 224L500 166Z" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="heading" x="575" y="161" text-anchor="middle">Target</text>
  <text class="heading" x="575" y="182" text-anchor="middle">error?</text>

  <path class="arrow" d="M650 166H715" />
  <text class="label" x="683" y="153" text-anchor="middle" fill="#15803d">No</text>
  <rect x="715" y="122" width="170" height="88" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
  <text class="heading" x="800" y="152" text-anchor="middle">Grade response</text>
  <text class="body" x="800" y="176" text-anchor="middle">Return the first valid</text>
  <text class="body" x="800" y="196" text-anchor="middle">response and stop</text>

  <path class="arrow" d="M575 224V275" />
  <text class="label" x="591" y="252" fill="#b45309">Yes</text>
  <rect x="480" y="275" width="190" height="76" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" />
  <text class="heading" x="575" y="306" text-anchor="middle">Candidates left?</text>
  <text class="body" x="575" y="329" text-anchor="middle">Continue only on error</text>

  <path class="arrow" d="M480 314H362V210" />
  <text class="label" x="414" y="301" text-anchor="middle" fill="#2563eb">Yes — try next</text>
  <path class="arrow" d="M670 314H715" />
  <text class="label" x="693" y="301" text-anchor="middle" fill="#b91c1c">No</text>
  <rect x="715" y="275" width="170" height="76" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
  <text class="heading" x="800" y="306" text-anchor="middle">Return error</text>
  <text class="body" x="800" y="329" text-anchor="middle">No candidates remain</text>
</svg>
