<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">Custom multi-turn strategy flow</title>
  <desc id="desc">Natural-language strategy instructions guide each conversation turn using the objective, remaining turns, and conversation history.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#64748b" /></marker><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; } .title { font-size: 24px; font-weight: 700; } .heading { font-size: 17px; font-weight: 600; } .body { font-size: 14px; fill: #475569; } .arrow { stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }</style></defs>
  <rect width="920" height="300" fill="#ffffff" /><text class="title" x="460" y="42" text-anchor="middle">Custom strategy conversation flow</text>
  <rect x="35" y="98" width="200" height="102" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" /><text class="heading" x="135" y="130" text-anchor="middle">Strategy instructions</text><text class="body" x="135" y="156" text-anchor="middle">Persona, escalation, and</text><text class="body" x="135" y="176" text-anchor="middle">response to refusals</text>
  <path class="arrow" d="M235 149H275" /><rect x="275" y="98" width="195" height="102" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" /><text class="heading" x="372" y="130" text-anchor="middle">Generate next turn</text><text class="body" x="372" y="156" text-anchor="middle">Use the objective, history,</text><text class="body" x="372" y="176" text-anchor="middle">and turns remaining</text>
  <path class="arrow" d="M470 149H510" /><rect x="510" y="98" width="170" height="102" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" /><text class="heading" x="595" y="130" text-anchor="middle">Call target</text><text class="body" x="595" y="156" text-anchor="middle">Send the current</text><text class="body" x="595" y="176" text-anchor="middle">conversation turn</text>
  <path class="arrow" d="M680 149H720" /><rect x="720" y="98" width="165" height="102" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" /><text class="heading" x="802" y="130" text-anchor="middle">Adapt or stop</text><text class="body" x="802" y="156" text-anchor="middle">Grade the response</text><text class="body" x="802" y="176" text-anchor="middle">and continue if needed</text>
  <path d="M802 200V248H372V200" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" /><text class="body" x="588" y="240" text-anchor="middle">Conversation history informs the next turn.</text>
</svg>
