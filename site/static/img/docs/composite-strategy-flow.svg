<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 330" role="img" aria-labelledby="title desc">
  <title id="title">Composite jailbreak flow</title>
  <desc id="desc">Composite jailbreaks combine an intent with evasions and techniques, generate one or more single-turn variants, and send them to the target.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#64748b" /></marker><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; } .title { font-size: 24px; font-weight: 700; } .heading { font-size: 17px; font-weight: 600; } .body { font-size: 14px; fill: #475569; } .arrow { stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }</style></defs>
  <rect width="920" height="330" fill="#ffffff" /><text class="title" x="460" y="42" text-anchor="middle">Composite jailbreak flow</text>
  <rect x="35" y="106" width="145" height="92" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" /><text class="heading" x="107" y="138" text-anchor="middle">Intent</text><text class="body" x="107" y="164" text-anchor="middle">Original test</text><text class="body" x="107" y="184" text-anchor="middle">objective</text>
  <path class="arrow" d="M180 152H220" /><rect x="220" y="106" width="170" height="92" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" /><text class="heading" x="305" y="138" text-anchor="middle">Evasions</text><text class="body" x="305" y="164" text-anchor="middle">Obfuscate or encode</text><text class="body" x="305" y="184" text-anchor="middle">the intent</text>
  <path class="arrow" d="M390 152H430" /><rect x="430" y="106" width="170" height="92" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" /><text class="heading" x="515" y="138" text-anchor="middle">Techniques</text><text class="body" x="515" y="164" text-anchor="middle">Add the selected</text><text class="body" x="515" y="184" text-anchor="middle">attack framing</text>
  <path class="arrow" d="M600 152H640" /><rect x="640" y="106" width="145" height="92" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" /><text class="heading" x="712" y="138" text-anchor="middle">Variants</text><text class="body" x="712" y="164" text-anchor="middle">Cartesian or</text><text class="body" x="712" y="184" text-anchor="middle">series output</text>
  <path class="arrow" d="M785 152H810" /><rect x="810" y="106" width="80" height="92" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" /><text class="heading" x="850" y="160" text-anchor="middle">Target</text>
  <rect x="180" y="242" width="610" height="56" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" /><text class="body" x="485" y="266" text-anchor="middle">Default order: technique(evasion(intent)). Reverse the order when the entire</text><text class="body" x="485" y="286" text-anchor="middle">framed prompt should be obfuscated.</text>
</svg>
