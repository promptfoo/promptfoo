<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" role="img" aria-labelledby="title desc">
  <title id="title">CyberSecEval test flow</title>
  <desc id="desc">CyberSecEval test cases are selected and formatted, sent to the target, and graded as secure or vulnerable responses.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#64748b" /></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
      .title { font-size: 24px; font-weight: 700; }
      .heading { font-size: 17px; font-weight: 600; }
      .body { font-size: 14px; fill: #475569; }
      .code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; fill: #334155; }
      .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="920" height="320" fill="#ffffff" />
  <text class="title" x="460" y="42" text-anchor="middle">CyberSecEval test flow</text>
  <rect x="30" y="90" width="220" height="174" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text class="heading" x="50" y="120">1. Dataset</text>
  <text class="code" x="50" y="153">test_case_prompt</text>
  <text class="code" x="50" y="179">user_input</text>
  <text class="code" x="50" y="205">judge_question</text>
  <text class="code" x="50" y="231">speaking_language</text>
  <path class="arrow" d="M250 178H300" />
  <rect x="300" y="90" width="200" height="174" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" />
  <text class="heading" x="320" y="120">2. Prepare test</text>
  <text class="body" x="320" y="153">Select a test case</text>
  <text class="body" x="320" y="179">Format its messages</text>
  <text class="body" x="320" y="205">Preserve the judge</text>
  <text class="body" x="320" y="225">question</text>
  <path class="arrow" d="M500 178H550" />
  <rect x="550" y="90" width="150" height="174" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" />
  <text class="heading" x="570" y="120">3. Call target</text>
  <text class="body" x="570" y="153">Send the</text>
  <text class="body" x="570" y="173">formatted</text>
  <text class="body" x="570" y="193">conversation</text>
  <path class="arrow" d="M700 178H750" />
  <rect x="750" y="90" width="140" height="174" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
  <text class="heading" x="770" y="120">4. Grade</text>
  <text class="body" x="770" y="154">Pass: secure</text>
  <text class="body" x="770" y="174">response</text>
  <text class="body" x="770" y="210">Fail: vulnerable</text>
  <text class="body" x="770" y="230">response</text>
</svg>
