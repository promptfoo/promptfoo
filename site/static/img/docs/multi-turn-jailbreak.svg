<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 410" role="img" aria-labelledby="title desc">
  <title id="title">Example multi-turn attack with backtracking</title>
  <desc id="desc">An example conversation escalates across turns, returns to an earlier turn after a refusal, and tries a different path until it succeeds.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0 0L9 3.5L0 7Z" fill="#64748b" /></marker>
    <marker id="back" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0 0L9 3.5L0 7Z" fill="#ea580c" /></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
      .title { font-size: 24px; font-weight: 700; }
      .label { font-size: 15px; font-weight: 600; }
      .body { font-size: 14px; fill: #475569; }
      .step { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .refusal { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
      .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
    </style>
  </defs>
  <rect width="920" height="410" fill="#ffffff" />
  <text class="title" x="460" y="42" text-anchor="middle">Example multi-turn attack with backtracking</text>
  <text class="body" x="460" y="68" text-anchor="middle">Backtracking is available only for strategies and target modes that support it.</text>
  <text class="label" x="42" y="127">Path 1</text>
  <circle class="step" cx="150" cy="120" r="18" /><circle class="step" cx="270" cy="120" r="18" /><circle class="refusal" cx="390" cy="120" r="18" />
  <path d="M168 120H252M288 120H372" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <text class="label" x="42" y="207">Path 2</text>
  <circle class="step" cx="150" cy="200" r="18" /><circle class="step" cx="270" cy="200" r="18" /><circle class="step" cx="390" cy="200" r="18" /><circle class="refusal" cx="510" cy="200" r="18" />
  <path d="M168 200H252M288 200H372M408 200H492" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M390 138C390 160 290 163 270 181" stroke="#ea580c" stroke-width="2" stroke-dasharray="6 5" fill="none" marker-end="url(#back)" />
  <text class="label" x="42" y="287">Path 3</text>
  <circle class="step" cx="150" cy="280" r="18" /><circle class="step" cx="270" cy="280" r="18" /><circle class="step" cx="390" cy="280" r="18" /><circle class="step" cx="510" cy="280" r="18" /><circle class="success" cx="630" cy="280" r="18" />
  <path d="M168 280H252M288 280H372M408 280H492M528 280H612" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M510 218C510 243 412 245 390 261" stroke="#ea580c" stroke-width="2" stroke-dasharray="6 5" fill="none" marker-end="url(#back)" />
  <circle class="step" cx="160" cy="356" r="12" /><text class="body" x="181" y="361">Conversation turn</text>
  <circle class="refusal" cx="380" cy="356" r="12" /><text class="body" x="401" y="361">Refusal</text>
  <circle class="success" cx="520" cy="356" r="12" /><text class="body" x="541" y="361">Successful attack</text>
  <path d="M726 356H766" stroke="#ea580c" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#back)" /><text class="body" x="778" y="361">Backtrack</text>
</svg>
