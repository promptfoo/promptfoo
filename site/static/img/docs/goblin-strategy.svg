<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Goblin multi-turn flow</title>
  <desc id="desc">Goblin explores complementary pattern-completion, encoding, and logic paths, adapts to target responses, and can backtrack in replay mode.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#64748b" /></marker><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; } .title { font-size: 24px; font-weight: 700; } .heading { font-size: 17px; font-weight: 600; } .body { font-size: 14px; fill: #475569; } .arrow { stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }</style></defs>
  <rect width="920" height="360" fill="#ffffff" /><text class="title" x="460" y="42" text-anchor="middle">Goblin explores complementary multi-turn paths</text>
  <rect x="35" y="100" width="195" height="94" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" /><text class="heading" x="132" y="132" text-anchor="middle">1. Select an approach</text><text class="body" x="132" y="157" text-anchor="middle">Pattern completion,</text><text class="body" x="132" y="177" text-anchor="middle">encoding, or logic</text>
  <path class="arrow" d="M230 147H270" /><rect x="270" y="100" width="190" height="94" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" /><text class="heading" x="365" y="132" text-anchor="middle">2. Generate a turn</text><text class="body" x="365" y="157" text-anchor="middle">Apply the approach to</text><text class="body" x="365" y="177" text-anchor="middle">the current objective</text>
  <path class="arrow" d="M460 147H500" /><rect x="500" y="100" width="175" height="94" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" /><text class="heading" x="587" y="132" text-anchor="middle">3. Probe target</text><text class="body" x="587" y="157" text-anchor="middle">Replay history or send</text><text class="body" x="587" y="177" text-anchor="middle">the newest turn</text>
  <path class="arrow" d="M675 147H715" /><rect x="715" y="100" width="170" height="94" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" /><text class="heading" x="800" y="132" text-anchor="middle">4. Adapt</text><text class="body" x="800" y="157" text-anchor="middle">Grade the response and</text><text class="body" x="800" y="177" text-anchor="middle">choose a new path</text>
  <path d="M800 194V246H132V194" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" /><text class="body" x="466" y="238" text-anchor="middle">Backtrack after refusals in replay mode; share learnings across the scan.</text>
  <rect x="180" y="280" width="560" height="52" rx="9" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" /><text class="body" x="460" y="312" text-anchor="middle">Use Goblin after Hydra to cover complementary conversational paths.</text>
</svg>
