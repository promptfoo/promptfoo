<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 350" role="img" aria-labelledby="title desc">
  <title id="title">Meta-Agent single-turn attack flow</title>
  <desc id="desc">The meta-agent selects an attack approach, sends an independent single-turn prompt, grades the response, and switches approaches until success or the iteration limit.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#64748b" /></marker><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; } .title { font-size: 24px; font-weight: 700; } .heading { font-size: 17px; font-weight: 600; } .body { font-size: 14px; fill: #475569; } .arrow { stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }</style></defs>
  <rect width="920" height="350" fill="#ffffff" /><text class="title" x="460" y="42" text-anchor="middle">Meta-Agent single-turn attack flow</text>
  <rect x="35" y="102" width="200" height="98" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" /><text class="heading" x="135" y="134" text-anchor="middle">1. Select an approach</text><text class="body" x="135" y="160" text-anchor="middle">Use earlier attempts to</text><text class="body" x="135" y="180" text-anchor="middle">choose a new technique</text>
  <path class="arrow" d="M235 151H275" /><rect x="275" y="102" width="185" height="98" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" /><text class="heading" x="367" y="134" text-anchor="middle">2. Generate prompt</text><text class="body" x="367" y="160" text-anchor="middle">Create one independent</text><text class="body" x="367" y="180" text-anchor="middle">single-turn attempt</text>
  <path class="arrow" d="M460 151H500" /><rect x="500" y="102" width="165" height="98" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" /><text class="heading" x="582" y="134" text-anchor="middle">3. Call target</text><text class="body" x="582" y="160" text-anchor="middle">No conversation</text><text class="body" x="582" y="180" text-anchor="middle">history is required</text>
  <path class="arrow" d="M665 151H705" /><rect x="705" y="102" width="180" height="98" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" /><text class="heading" x="795" y="134" text-anchor="middle">4. Grade response</text><text class="body" x="795" y="160" text-anchor="middle">Stop on success or</text><text class="body" x="795" y="180" text-anchor="middle">switch approaches</text>
  <path d="M795 200V255H135V200" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" /><text class="body" x="465" y="246" text-anchor="middle">Continue until an attack succeeds, the attacker stops, or the iteration limit is reached.</text>
  <rect x="180" y="278" width="560" height="48" rx="9" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" /><text class="body" x="460" y="308" text-anchor="middle">Meta adapts across attempts; each target call remains single-turn.</text>
</svg>
