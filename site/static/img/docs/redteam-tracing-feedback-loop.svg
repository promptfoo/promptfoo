<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 410" role="img" aria-labelledby="title desc">
  <title id="title">Red team tracing feedback loop</title>
  <desc id="desc">An attack prompt reaches the agent, OpenTelemetry captures internal events, trace analysis identifies the failure path, and the attacker uses that feedback on the next attempt.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#64748b" /></marker>
    <marker id="feedback" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#15803d" /></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
      .title { font-size: 24px; font-weight: 700; }
      .heading { font-size: 17px; font-weight: 600; }
      .body { font-size: 14px; fill: #475569; }
      .code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; fill: #334155; }
    </style>
  </defs>
  <rect width="920" height="410" fill="#ffffff" />
  <text class="title" x="460" y="42" text-anchor="middle">Use traces to refine red team attacks</text>
  <rect x="35" y="98" width="210" height="104" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="heading" x="55" y="130">1. Attack strategy</text>
  <text class="body" x="55" y="157">Generates the next</text>
  <text class="body" x="55" y="179">adversarial prompt</text>
  <path d="M245 150H290" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="290" y="98" width="230" height="104" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text class="heading" x="310" y="130">2. Agent system</text>
  <text class="body" x="310" y="157">LLM, guardrails, tools,</text>
  <text class="body" x="310" y="179">and response handling</text>
  <path d="M520 150H565" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="565" y="98" width="320" height="104" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" />
  <text class="heading" x="585" y="130">3. OpenTelemetry traces</text>
  <text class="code" x="585" y="158">guardrail.check  decision=blocked</text>
  <text class="code" x="585" y="182">tool.call        status=error</text>
  <path d="M725 202V248" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="565" y="248" width="320" height="104" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" />
  <text class="heading" x="585" y="280">4. Trace analysis</text>
  <text class="body" x="585" y="307">Identify which guardrail, tool, or</text>
  <text class="body" x="585" y="329">agent step shaped the outcome</text>
  <path d="M565 302H140V202" stroke="#15803d" stroke-width="2.5" stroke-dasharray="7 5" fill="none" marker-end="url(#feedback)" />
  <text class="body" x="347" y="292" text-anchor="middle" fill="#15803d">Trace feedback informs the next attempt</text>
</svg>
