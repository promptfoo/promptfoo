<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 450" role="img" aria-labelledby="title desc">
  <title id="title">OWASP Top 10 for LLM Applications</title>
  <desc id="desc">The ten OWASP risk categories for LLM applications, including prompt injection, sensitive information disclosure, supply chain, data and model poisoning, improper output handling, excessive agency, system prompt leakage, vector and embedding weaknesses, misinformation, and unbounded consumption.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
    .title { font-size: 24px; font-weight: 700; }
    .heading { font-size: 16px; font-weight: 600; }
    .body { font-size: 14px; fill: #475569; }
    .number { font-size: 15px; font-weight: 700; fill: #1d4ed8; }
  </style>
  <rect width="920" height="450" fill="#ffffff" />
  <text class="title" x="460" y="42" text-anchor="middle">OWASP Top 10 for LLM Applications</text>
  <g fill="#eff6ff" stroke="#2563eb" stroke-width="1.5">
    <rect x="35" y="78" width="410" height="58" rx="9" /><rect x="475" y="78" width="410" height="58" rx="9" />
    <rect x="35" y="148" width="410" height="58" rx="9" /><rect x="475" y="148" width="410" height="58" rx="9" />
    <rect x="35" y="218" width="410" height="58" rx="9" /><rect x="475" y="218" width="410" height="58" rx="9" />
    <rect x="35" y="288" width="410" height="58" rx="9" /><rect x="475" y="288" width="410" height="58" rx="9" />
    <rect x="35" y="358" width="410" height="58" rx="9" /><rect x="475" y="358" width="410" height="58" rx="9" />
  </g>
  <text class="number" x="56" y="103">LLM01</text><text class="heading" x="120" y="103">Prompt Injection</text><text class="body" x="120" y="125">Untrusted instructions influence the model</text>
  <text class="number" x="496" y="103">LLM02</text><text class="heading" x="560" y="103">Sensitive Information Disclosure</text><text class="body" x="560" y="125">Private data appears in outputs</text>
  <text class="number" x="56" y="173">LLM03</text><text class="heading" x="120" y="173">Supply Chain</text><text class="body" x="120" y="195">Dependencies or models are compromised</text>
  <text class="number" x="496" y="173">LLM04</text><text class="heading" x="560" y="173">Data and Model Poisoning</text><text class="body" x="560" y="195">Training or retrieval data changes behavior</text>
  <text class="number" x="56" y="243">LLM05</text><text class="heading" x="120" y="243">Improper Output Handling</text><text class="body" x="120" y="265">Unsafe outputs reach downstream systems</text>
  <text class="number" x="496" y="243">LLM06</text><text class="heading" x="560" y="243">Excessive Agency</text><text class="body" x="560" y="265">The model can take unintended actions</text>
  <text class="number" x="56" y="313">LLM07</text><text class="heading" x="120" y="313">System Prompt Leakage</text><text class="body" x="120" y="335">Hidden instructions are exposed</text>
  <text class="number" x="496" y="313">LLM08</text><text class="heading" x="560" y="313">Vector and Embedding Weaknesses</text><text class="body" x="560" y="335">Retrieval or embedding behavior is abused</text>
  <text class="number" x="56" y="383">LLM09</text><text class="heading" x="120" y="383">Misinformation</text><text class="body" x="120" y="405">False or misleading content is presented</text>
  <text class="number" x="496" y="383">LLM10</text><text class="heading" x="560" y="383">Unbounded Consumption</text><text class="body" x="560" y="405">Requests exhaust time, tokens, or resources</text>
</svg>
