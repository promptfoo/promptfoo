<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AgentDojo GPT-5.4 run summary</title>
  <desc id="desc">Summary cards for security, targeted ASR, utility, safe utility, and operational notes from the AgentDojo workspace run.</desc>
  <rect width="1200" height="720" fill="#f6f8fb"/>
  <rect x="48" y="42" width="1104" height="636" rx="10" fill="#ffffff" stroke="#d8dee8"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="82" y="94" font-size="30" font-weight="800" fill="#182433">AgentDojo workspace run: GPT-5.4, no defense</text>
    <text x="82" y="126" font-size="15" fill="#52657a">560 rows: 40 user tasks x 14 injection tasks. Attack: important_instructions. Benchmark: AgentDojo v1.2.2.</text>

    <rect x="82" y="166" width="238" height="158" rx="8" fill="#ffffff" stroke="#d8dee8"/>
    <text x="100" y="199" font-size="15" font-weight="700" fill="#314158">Security</text>
    <text x="100" y="247" font-size="38" font-weight="800" fill="#127a52">100.0%</text>
    <text x="100" y="276" font-size="13" fill="#52657a">560/560 injection goals</text>
    <text x="100" y="298" font-size="13" fill="#52657a">not executed</text>

    <rect x="348" y="166" width="238" height="158" rx="8" fill="#ffffff" stroke="#d8dee8"/>
    <text x="366" y="199" font-size="15" font-weight="700" fill="#314158">Targeted ASR</text>
    <text x="366" y="247" font-size="38" font-weight="800" fill="#ba3b46">0.0%</text>
    <text x="366" y="276" font-size="13" fill="#52657a">0/560 injection goals</text>
    <text x="366" y="298" font-size="13" fill="#52657a">executed</text>

    <rect x="614" y="166" width="238" height="158" rx="8" fill="#ffffff" stroke="#d8dee8"/>
    <text x="632" y="199" font-size="15" font-weight="700" fill="#314158">Utility</text>
    <text x="632" y="247" font-size="38" font-weight="800" fill="#2f5fb3">95.2%</text>
    <text x="632" y="276" font-size="13" fill="#52657a">533/560 user tasks</text>
    <text x="632" y="298" font-size="13" fill="#52657a">completed</text>

    <rect x="880" y="166" width="238" height="158" rx="8" fill="#ffffff" stroke="#d8dee8"/>
    <text x="898" y="199" font-size="15" font-weight="700" fill="#314158">Safe utility</text>
    <text x="898" y="247" font-size="38" font-weight="800" fill="#7a4fb3">95.2%</text>
    <text x="898" y="276" font-size="13" fill="#52657a">533/560 both useful</text>
    <text x="898" y="298" font-size="13" fill="#52657a">and secure</text>

    <rect x="82" y="360" width="1036" height="206" rx="8" fill="#f9fbfd" stroke="#d8dee8"/>
    <text x="112" y="399" font-size="18" font-weight="800" fill="#182433">Operational notes from the export</text>
    <text x="112" y="435" font-size="15" fill="#314158">Trace coverage: 560/560 rows had a Promptfoo traceparent and an agentdojo.task span.</text>
    <text x="112" y="465" font-size="15" fill="#314158">Token usage: 6,279,086 total tokens across 560 requests.</text>
    <text x="112" y="495" font-size="15" fill="#314158">Interpretation: no targeted injection goal was executed in this run.</text>
    <text x="112" y="525" font-size="15" fill="#314158">Remaining failures were user-task utility failures, not security failures.</text>

    <text x="82" y="604" font-size="12" fill="#6b7a90">Computed from the exported Promptfoo JSON using raw agentdojo_trace.utility and agentdojo_trace.security values.</text>
    <text x="82" y="626" font-size="12" fill="#6b7a90">This is one suite, one attack, one wrapper, and no defense. It is not a general security proof.</text>
  </g>
</svg>
