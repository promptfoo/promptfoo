<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="740" viewBox="0 0 1200 740" role="img" aria-labelledby="title desc">
  <title id="title">AgentDojo model comparison</title>
  <desc id="desc">A table comparing GPT-5.4 and GPT-3.5 Turbo 0125 on utility, safe utility, security, attack success, context failures, and trace coverage.</desc>
  <rect width="1200" height="740" fill="#f6f8fb"/>
  <rect x="48" y="42" width="1104" height="654" rx="10" fill="#ffffff" stroke="#d8dee8"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="82" y="94" font-size="30" font-weight="800" fill="#182433">AgentDojo workspace comparison</text>
    <text x="82" y="126" font-size="15" fill="#52657a">Both runs use the workspace suite, important_instructions attack, no defense, and 560 rows.</text>

    <rect x="82" y="154" width="1036" height="62" fill="#eaf1fb"/>
    <text x="110" y="192" font-size="13" font-weight="800" fill="#314158">Metric</text>
    <text x="568" y="177" text-anchor="middle" font-size="13" font-weight="800" fill="#314158">GPT-5.4</text>
    <text x="902" y="177" text-anchor="middle" font-size="13" font-weight="800" fill="#314158">GPT-3.5 Turbo 0125</text>
    <text x="500" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#52657a">count</text>
    <text x="636" y="198" text-anchor="end" font-size="12" font-weight="700" fill="#52657a">rate</text>
    <text x="842" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#52657a">count</text>
    <text x="1030" y="198" text-anchor="end" font-size="12" font-weight="700" fill="#52657a">rate</text>

    <rect x="82" y="216" width="1036" height="50" fill="#f8fafc"/>
    <text x="110" y="247" font-size="15" font-weight="700" fill="#314158">Utility</text>
    <text x="500" y="247" text-anchor="middle" font-size="15" fill="#182433">533/560</text>
    <text x="636" y="247" text-anchor="end" font-size="15" font-weight="700" fill="#127a52">95.2%</text>
    <text x="842" y="247" text-anchor="middle" font-size="15" fill="#182433">206/560</text>
    <text x="1030" y="247" text-anchor="end" font-size="15" font-weight="700" fill="#2f5fb3">36.8%</text>

    <rect x="82" y="266" width="1036" height="50" fill="#ffffff"/>
    <text x="110" y="297" font-size="15" font-weight="700" fill="#314158">Safe utility</text>
    <text x="500" y="297" text-anchor="middle" font-size="15" fill="#182433">533/560</text>
    <text x="636" y="297" text-anchor="end" font-size="15" font-weight="700" fill="#127a52">95.2%</text>
    <text x="842" y="297" text-anchor="middle" font-size="15" fill="#182433">206/560</text>
    <text x="1030" y="297" text-anchor="end" font-size="15" font-weight="700" fill="#2f5fb3">36.8%</text>

    <rect x="82" y="316" width="1036" height="50" fill="#f8fafc"/>
    <text x="110" y="347" font-size="15" font-weight="700" fill="#314158">Scored security</text>
    <text x="500" y="347" text-anchor="middle" font-size="15" fill="#182433">560/560</text>
    <text x="636" y="347" text-anchor="end" font-size="15" font-weight="700" fill="#127a52">100.0%</text>
    <text x="842" y="347" text-anchor="middle" font-size="15" fill="#182433">529/560</text>
    <text x="1030" y="347" text-anchor="end" font-size="15" font-weight="700" fill="#2f5fb3">94.5%</text>

    <rect x="82" y="366" width="1036" height="50" fill="#ffffff"/>
    <text x="110" y="397" font-size="15" font-weight="700" fill="#314158">Scored targeted ASR</text>
    <text x="500" y="397" text-anchor="middle" font-size="15" fill="#182433">0/560</text>
    <text x="636" y="397" text-anchor="end" font-size="15" font-weight="700" fill="#127a52">0.0%</text>
    <text x="842" y="397" text-anchor="middle" font-size="15" fill="#182433">31/560</text>
    <text x="1030" y="397" text-anchor="end" font-size="15" font-weight="700" fill="#ba3b46">5.5%</text>

    <rect x="82" y="416" width="1036" height="50" fill="#f8fafc"/>
    <text x="110" y="447" font-size="15" font-weight="700" fill="#314158">Runnable targeted ASR</text>
    <text x="500" y="447" text-anchor="middle" font-size="15" fill="#182433">0/560</text>
    <text x="636" y="447" text-anchor="end" font-size="15" font-weight="700" fill="#127a52">0.0%</text>
    <text x="842" y="447" text-anchor="middle" font-size="15" fill="#182433">1/530</text>
    <text x="1030" y="447" text-anchor="end" font-size="15" font-weight="700" fill="#ba3b46">0.2%</text>

    <rect x="82" y="466" width="1036" height="50" fill="#ffffff"/>
    <text x="110" y="497" font-size="15" font-weight="700" fill="#314158">Context-window failures</text>
    <text x="500" y="497" text-anchor="middle" font-size="15" fill="#182433">0/560</text>
    <text x="636" y="497" text-anchor="end" font-size="15" font-weight="700" fill="#127a52">0.0%</text>
    <text x="842" y="497" text-anchor="middle" font-size="15" fill="#182433">30/560</text>
    <text x="1030" y="497" text-anchor="end" font-size="15" font-weight="700" fill="#ba3b46">5.4%</text>

    <rect x="82" y="516" width="1036" height="50" fill="#f8fafc"/>
    <text x="110" y="547" font-size="15" font-weight="700" fill="#314158">Trace coverage</text>
    <text x="500" y="547" text-anchor="middle" font-size="15" fill="#182433">560/560</text>
    <text x="636" y="547" text-anchor="end" font-size="15" font-weight="700" fill="#127a52">100.0%</text>
    <text x="842" y="547" text-anchor="middle" font-size="15" fill="#182433">560/560</text>
    <text x="1030" y="547" text-anchor="end" font-size="15" font-weight="700" fill="#2f5fb3">100.0%</text>

    <rect x="82" y="592" width="1036" height="58" rx="6" fill="#fff7ed" stroke="#f0d0a5"/>
    <text x="106" y="617" font-size="13" fill="#5c3b13">GPT-3.5&apos;s 31 scored ASR rows include 30 context-window failures.</text>
    <text x="106" y="638" font-size="13" fill="#5c3b13">Only one completed runnable row executed the targeted attack.</text>
  </g>
</svg>
