<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 290" role="img" aria-labelledby="title desc">
  <title id="title">Model drift detection flow</title>
  <desc id="desc">Promptfoo establishes a baseline, repeats the same tests, compares attack success rates, and alerts when the result crosses a threshold.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#64748b" /></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
      .title { font-size: 24px; font-weight: 700; }
      .heading { font-size: 17px; font-weight: 600; }
      .body { font-size: 14px; fill: #475569; }
      .value { font-size: 16px; font-weight: 700; }
    </style>
  </defs>
  <rect width="920" height="290" fill="#ffffff" />
  <text class="title" x="460" y="42" text-anchor="middle">Detect model drift over time</text>
  <rect x="28" y="88" width="190" height="150" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
  <text class="heading" x="123" y="119" text-anchor="middle">1. Baseline</text>
  <text class="value" x="123" y="154" text-anchor="middle" fill="#15803d">ASR: 8%</text>
  <text class="body" x="123" y="184" text-anchor="middle">Run an initial</text>
  <text class="body" x="123" y="204" text-anchor="middle">red team</text>
  <path d="M218 162H254" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="254" y="88" width="190" height="150" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" />
  <text class="heading" x="349" y="119" text-anchor="middle">2. Repeat</text>
  <text class="value" x="349" y="154" text-anchor="middle">T0 → Tn</text>
  <text class="body" x="349" y="184" text-anchor="middle">Run the same tests</text>
  <text class="body" x="349" y="204" text-anchor="middle">on a schedule</text>
  <path d="M444 162H480" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="480" y="88" width="190" height="150" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text class="heading" x="575" y="119" text-anchor="middle">3. Compare</text>
  <text class="value" x="575" y="154" text-anchor="middle" fill="#1d4ed8">8% → 14%</text>
  <text class="body" x="575" y="184" text-anchor="middle">Attack success rose</text>
  <text class="body" x="575" y="204" text-anchor="middle">6 percentage points</text>
  <path d="M670 162H706" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="706" y="88" width="186" height="150" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="heading" x="799" y="119" text-anchor="middle">4. Respond</text>
  <text class="value" x="799" y="154" text-anchor="middle" fill="#c2410c">Threshold</text>
  <text class="body" x="799" y="184" text-anchor="middle">Alert or block CI</text>
  <text class="body" x="799" y="204" text-anchor="middle">when drift is detected</text>
</svg>
