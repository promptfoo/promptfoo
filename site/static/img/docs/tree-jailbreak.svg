<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" role="img" aria-labelledby="title desc">
  <title id="title">Tree-based jailbreak search</title>
  <desc id="desc">A tree search creates independent single-shot prompt variations, prunes weaker branches, and continues promising branches until it finds a successful prompt.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0 0L9 3.5L0 7Z" fill="#64748b" /></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
      .title { font-size: 24px; font-weight: 700; }
      .label { font-size: 14px; font-weight: 600; }
      .body { font-size: 14px; fill: #475569; }
      .active { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .pruned { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; }
      .success { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
      .edge { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="920" height="470" fill="#ffffff" />
  <text class="title" x="460" y="42" text-anchor="middle">Tree-based jailbreak search</text>
  <text class="body" x="460" y="68" text-anchor="middle">Each node is an independent single-shot prompt, not a continuing conversation.</text>
  <rect class="active" x="370" y="92" width="180" height="48" rx="8" /><text class="label" x="460" y="122" text-anchor="middle">Original prompt</text>
  <path class="edge" d="M430 140L235 182M460 140V182M490 140L685 182" />
  <rect class="active" x="150" y="182" width="170" height="48" rx="8" /><text class="label" x="235" y="212" text-anchor="middle">Variation 1</text>
  <rect class="active" x="375" y="182" width="170" height="48" rx="8" /><text class="label" x="460" y="212" text-anchor="middle">Variation 2</text>
  <rect class="pruned" x="600" y="182" width="170" height="48" rx="8" /><text class="label" x="685" y="212" text-anchor="middle">Variation 3</text><path d="M622 196L748 216M748 196L622 216" stroke="#b91c1c" stroke-width="2" />
  <path class="edge" d="M215 230L130 277M255 230L310 277M440 230L540 277M480 230L760 277" />
  <rect class="active" x="55" y="277" width="150" height="48" rx="8" /><text class="label" x="130" y="307" text-anchor="middle">Variation 1.1</text>
  <rect class="pruned" x="235" y="277" width="150" height="48" rx="8" /><text class="label" x="310" y="307" text-anchor="middle">Variation 1.2</text><path d="M255 291L365 311M365 291L255 311" stroke="#b91c1c" stroke-width="2" />
  <rect class="active" x="465" y="277" width="150" height="48" rx="8" /><text class="label" x="540" y="307" text-anchor="middle">Variation 2.1</text>
  <rect class="pruned" x="685" y="277" width="150" height="48" rx="8" /><text class="label" x="760" y="307" text-anchor="middle">Variation 2.2</text><path d="M705 291L815 311M815 291L705 311" stroke="#b91c1c" stroke-width="2" />
  <path class="edge" d="M130 325L225 375M540 325L540 375" />
  <rect class="pruned" x="145" y="375" width="160" height="48" rx="8" /><text class="label" x="225" y="405" text-anchor="middle">Variation 1.1.1</text><path d="M165 389L285 409M285 389L165 409" stroke="#b91c1c" stroke-width="2" />
  <rect class="success" x="445" y="375" width="190" height="48" rx="8" /><text class="label" x="540" y="405" text-anchor="middle">Successful prompt</text>
  <rect class="active" x="716" y="376" width="20" height="20" rx="4" /><text class="body" x="744" y="392">Explored</text>
  <rect class="pruned" x="716" y="412" width="20" height="20" rx="4" /><text class="body" x="744" y="428">Pruned</text>
  <rect class="success" x="824" y="376" width="20" height="20" rx="4" /><text class="body" x="852" y="392">Success</text>
</svg>
