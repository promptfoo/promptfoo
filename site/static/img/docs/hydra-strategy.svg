<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 390" role="img" aria-labelledby="title desc">
  <title id="title">Hydra multi-turn flow</title>
  <desc id="desc">Hydra selects a goal, generates a conversation turn, probes the target, grades the response, and adapts or backtracks in replay mode while sharing learnings across the scan.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#64748b" /></marker><marker id="learn" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#15803d" /></marker><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; } .title { font-size: 24px; font-weight: 700; } .heading { font-size: 17px; font-weight: 600; } .body { font-size: 14px; fill: #475569; } .arrow { stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }</style></defs>
  <rect width="920" height="390" fill="#ffffff" /><text class="title" x="460" y="42" text-anchor="middle">Hydra multi-turn flow</text>
  <rect x="35" y="98" width="175" height="94" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" /><text class="heading" x="122" y="130" text-anchor="middle">1. Select goal</text><text class="body" x="122" y="155" text-anchor="middle">Use the plugin or</text><text class="body" x="122" y="175" text-anchor="middle">injected objective</text>
  <path class="arrow" d="M210 145H250" /><rect x="250" y="98" width="195" height="94" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" /><text class="heading" x="347" y="130" text-anchor="middle">2. Choose next turn</text><text class="body" x="347" y="155" text-anchor="middle">Use prior turns and</text><text class="body" x="347" y="175" text-anchor="middle">scan-wide learnings</text>
  <path class="arrow" d="M445 145H485" /><rect x="485" y="98" width="175" height="94" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" /><text class="heading" x="572" y="130" text-anchor="middle">3. Probe target</text><text class="body" x="572" y="155" text-anchor="middle">Replay history or send</text><text class="body" x="572" y="175" text-anchor="middle">the newest turn</text>
  <path class="arrow" d="M660 145H700" /><rect x="700" y="98" width="185" height="94" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" /><text class="heading" x="792" y="130" text-anchor="middle">4. Grade response</text><text class="body" x="792" y="155" text-anchor="middle">Record success, refusal,</text><text class="body" x="792" y="175" text-anchor="middle">or a new path</text>
  <path d="M792 192V250H347V192" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" /><text class="body" x="573" y="242" text-anchor="middle">Adapt the next turn; backtrack after refusals in replay mode</text>
  <rect x="250" y="286" width="635" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" /><text class="heading" x="567" y="314" text-anchor="middle">Scan-wide memory</text><text class="body" x="567" y="338" text-anchor="middle">Later test cases can reuse successful tactics discovered earlier in the scan.</text><path d="M792 286V250" stroke="#15803d" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#learn)" />
</svg>
