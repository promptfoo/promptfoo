<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">GOAT attack flow and stop conditions</title>
  <desc id="desc">GOAT generates and sends an adaptive prompt, grades the response, and either stops after success or continues until the turn limit.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#64748b" /></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
      .title { font-size: 24px; font-weight: 700; }
      .heading { font-size: 17px; font-weight: 600; }
      .body { font-size: 14px; fill: #475569; }
      .label { font-size: 14px; font-weight: 600; }
      .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="920" height="360" fill="#ffffff" />
  <text class="title" x="460" y="42" text-anchor="middle">GOAT attack flow</text>
  <rect x="35" y="105" width="185" height="98" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text class="heading" x="127" y="137" text-anchor="middle">Generate prompt</text>
  <text class="body" x="127" y="163" text-anchor="middle">Adapt the approach</text>
  <text class="body" x="127" y="183" text-anchor="middle">for this turn</text>
  <path class="arrow" d="M220 154H260" />
  <rect x="260" y="105" width="170" height="98" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" />
  <text class="heading" x="345" y="137" text-anchor="middle">Call target</text>
  <text class="body" x="345" y="163" text-anchor="middle">Send the current</text>
  <text class="body" x="345" y="183" text-anchor="middle">conversation turn</text>
  <path class="arrow" d="M430 154H470" />
  <rect x="470" y="105" width="175" height="98" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" />
  <text class="heading" x="557" y="137" text-anchor="middle">Grade response</text>
  <text class="body" x="557" y="163" text-anchor="middle">Check the configured</text>
  <text class="body" x="557" y="183" text-anchor="middle">assertion</text>
  <path class="arrow" d="M645 154H705" />
  <path d="M785 96L865 154L785 212L705 154Z" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="heading" x="785" y="148" text-anchor="middle">Goal</text>
  <text class="heading" x="785" y="169" text-anchor="middle">reached?</text>
  <path class="arrow" d="M785 212V278" />
  <text class="label" x="801" y="242" fill="#15803d">Yes</text>
  <rect x="695" y="278" width="180" height="58" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
  <text class="heading" x="785" y="314" text-anchor="middle">Stop by default</text>
  <path class="arrow" d="M705 154H665V255H127V203" />
  <text class="label" x="398" y="246" text-anchor="middle" fill="#2563eb">No — continue until the turn limit</text>
  <text class="body" x="460" y="294" text-anchor="middle">Set continueAfterSuccess to keep searching after a successful attack.</text>
</svg>
