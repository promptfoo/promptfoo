<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 240" role="img" aria-labelledby="title desc">
  <title id="title">Direct MCP server testing</title>
  <desc id="desc">Promptfoo uses the MCP provider to discover tools and send explicit tool calls directly to the MCP server, then checks the configured assertions. No application or model is in the request path.</desc>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker></defs>
  <style>text{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:17px;font-weight:650}.sub{font-size:14px;fill:#475569}.box{fill:#fff;stroke:#94a3b8;stroke-width:1.5}.blue{fill:#eff6ff;stroke:#2563eb;stroke-width:1.5}.line{fill:none;stroke:#64748b;stroke-width:1.5;marker-end:url(#arrow)}</style>
  <rect width="1080" height="240" rx="16" fill="#f8fafc"/>
  <text x="32" y="42" class="title">Direct MCP testing</text>
  <text x="32" y="66" class="sub">Send explicit tool calls over MCP and check API-level behavior without an intermediate application or model.</text>
  <rect x="32" y="104" width="136" height="78" rx="10" class="box"/><text x="100" y="137" text-anchor="middle" class="title">Promptfoo</text><text x="100" y="160" text-anchor="middle" class="sub">Standard eval</text>
  <path d="M168 143H202" class="line"/>
  <rect x="204" y="104" width="144" height="78" rx="10" class="blue"/><text x="276" y="136" text-anchor="middle" class="title">MCP provider</text><text x="276" y="160" text-anchor="middle" class="sub">Direct connection</text>
  <path d="M348 143H382" class="line"/>
  <rect x="384" y="104" width="144" height="78" rx="10" class="blue"/><text x="456" y="136" text-anchor="middle" class="title">Discover tools</text><text x="456" y="160" text-anchor="middle" class="sub">tools/list</text>
  <path d="M528 143H562" class="line"/>
  <rect x="564" y="104" width="156" height="78" rx="10" class="box"/><text x="642" y="136" text-anchor="middle" class="title">Test cases</text><text x="642" y="160" text-anchor="middle" class="sub">Explicit tool inputs</text>
  <path d="M720 143H754" class="line"/>
  <rect x="756" y="104" width="144" height="78" rx="10" class="blue"/><text x="828" y="136" text-anchor="middle" class="title">MCP server</text><text x="828" y="160" text-anchor="middle" class="sub">tools/call</text>
  <path d="M900 143H934" class="line"/>
  <rect x="936" y="104" width="112" height="78" rx="10" class="box"/><text x="992" y="137" text-anchor="middle" class="title">Check</text><text x="992" y="160" text-anchor="middle" class="sub">Assertions</text>
</svg>
