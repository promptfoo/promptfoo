<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">GOAT reasoning loop</title>
  <desc id="desc">For each turn, GOAT observes the target response, chooses an approach, generates an attack prompt, and sends it to the target.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#64748b" /></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
      .title { font-size: 24px; font-weight: 700; }
      .heading { font-size: 17px; font-weight: 600; }
      .body { font-size: 14px; fill: #475569; }
      .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="920" height="300" fill="#ffffff" />
  <text class="title" x="460" y="42" text-anchor="middle">GOAT reasoning on each turn</text>
  <rect x="30" y="90" width="190" height="110" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text class="heading" x="125" y="122" text-anchor="middle">1. Observe</text>
  <text class="body" x="125" y="148" text-anchor="middle">Read the target's</text>
  <text class="body" x="125" y="168" text-anchor="middle">previous response</text>
  <path class="arrow" d="M220 145H260" />
  <rect x="260" y="90" width="190" height="110" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" />
  <text class="heading" x="355" y="122" text-anchor="middle">2. Plan</text>
  <text class="body" x="355" y="148" text-anchor="middle">Choose an approach</text>
  <text class="body" x="355" y="168" text-anchor="middle">based on progress</text>
  <path class="arrow" d="M450 145H490" />
  <rect x="490" y="90" width="190" height="110" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="heading" x="585" y="122" text-anchor="middle">3. Generate</text>
  <text class="body" x="585" y="148" text-anchor="middle">Create the next</text>
  <text class="body" x="585" y="168" text-anchor="middle">adversarial prompt</text>
  <path class="arrow" d="M680 145H720" />
  <rect x="720" y="90" width="170" height="110" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" />
  <text class="heading" x="805" y="122" text-anchor="middle">Target</text>
  <text class="body" x="805" y="148" text-anchor="middle">Responds to the</text>
  <text class="body" x="805" y="168" text-anchor="middle">current turn</text>
  <path class="arrow" d="M805 200V244H125V200" />
  <text class="body" x="465" y="236" text-anchor="middle">Use the response to adapt the next turn</text>
</svg>
