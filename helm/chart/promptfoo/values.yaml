# Default values for promptfoo.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/promptfoo/promptfoo
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: v1.0.0

imagePullSecrets:
  - name: <yourcred>
nameOverride: ''
fullnameOverride: ''

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ''

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
  port: 3000

# Deprecated: prefer ingress.hosts / ingress.tls below. Retained so existing installs
# that set only domainName keep rendering their host and TLS secret on upgrade; it is
# ignored once ingress.hosts is set.
domainName: 'promptfoo.example.com'

# While ingress.hosts is empty, the chart renders the legacy Ingress derived from
# domainName above: ingressClassName defaults to traefik (only when className is
# empty), the cert-manager.io/cluster-issuer: letsencrypt-cloudflare annotation is
# merged into annotations (your keys win on conflict), and tls defaults to the
# <release>-certificate-tls secret for domainName. Setting ingress.hosts disables
# all of these legacy defaults; set ingress.enabled: false to render no Ingress.
ingress:
  enabled: true
  className: ''
  annotations: {}
  # Replace [] below with a list of hosts, e.g.:
  hosts: []
  #   - host: promptfoo.example.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  # Replace [] below with a list of TLS entries, e.g.:
  tls: []
  #   - secretName: promptfoo-tls
  #     hosts:
  #       - promptfoo.example.com

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

persistentVolumesClaims:
  - name: promptfoo
    size: 1Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: default

# Additional volumes on the output Deployment definition.
volumes:
  - name: config
    persistentVolumeClaim:
      claimName: promptfoo

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - name: config
    mountPath: '/home/promptfoo/.promptfoo'
    readOnly: false

nodeSelector:
  kubernetes.io/arch: amd64

tolerations: []

affinity: {}
