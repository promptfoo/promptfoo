{{- if .Values.ingress.enabled -}}
{{- $fullName := include "promptfoo.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $hosts := .Values.ingress.hosts -}}
{{- $className := .Values.ingress.className -}}
{{- $annotations := .Values.ingress.annotations -}}
{{- $tls := .Values.ingress.tls -}}
{{- if not $hosts -}}
{{/* Back-compat: reproduce the legacy hard-coded Ingress from the deprecated domainName */}}
{{- $hosts = list (dict "host" .Values.domainName "paths" (list (dict "path" "/" "pathType" "Prefix"))) -}}
{{- if not $className }}{{- $className = "traefik" -}}{{- end -}}
{{- if not $annotations }}{{- $annotations = dict "cert-manager.io/cluster-issuer" "letsencrypt-cloudflare" -}}{{- end -}}
{{- if not $tls }}{{- $tls = list (dict "secretName" (printf "%s-certificate-tls" .Release.Name) "hosts" (list .Values.domainName)) -}}{{- end -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name | quote }}
  labels:
    {{- include "promptfoo.labels" . | nindent 4 }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with $tls }}
  tls:
    {{- range . }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range $hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
