# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: 'Simple test eval for Cameron Digital Twin API'

providers:
  - id: 'https://ai-digital-twin-b7kb.onrender.com/api/chat'
    config:
      method: POST
      headers:
        'Content-Type': 'application/json'
      body:
        message: '{{prompt}}'
        conversation_id: 'test-eval'
        history: []
      transformResponse: 'json.response'

prompts:
  - '{{message}}'

tests:
  - vars:
      message: 'Who is Cameron?'
    assert:
      - type: contains
        value: Cameron
  - vars:
      message: 'What are your skills?'
    assert:
      - type: llm-rubric
        value: "The response discusses someone's professional skills or abilities"
